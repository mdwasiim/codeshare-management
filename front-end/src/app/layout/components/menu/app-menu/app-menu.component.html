<ul class="layout-menu p-3 space-y-2">
    @for (item of model; track item.id ?? item.label; let i = $index) {

        @if (!item.separator) {
            <li class="px-2">
                <app-menu-item
                    [item]="item"
                    [index]="i"
                    [root]="true">
                </app-menu-item>
            </li>
        }

        @if (item.separator) {
            <li class="my-3 border-t border-gray-200"></li>
        }

    }
</ul>
