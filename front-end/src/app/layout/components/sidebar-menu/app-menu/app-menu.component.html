<ul class="layout-menu p-3 space-y-2">
    @for (item of model; track item.label;) {

        @if (!item.separator) {
            <li
                class="px-2"
                app-menuitem
                [item]="item"
                [root]="true">
            </li>
        }

        @if (item.separator) {
            <li class="my-3 border-t border-gray-200"></li>
        }

    }
</ul>
