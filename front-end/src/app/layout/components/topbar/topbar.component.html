<div class="layout-topbar enterprise-topbar">
    <div class="layout-topbar-logo-container">
        <button class="layout-menu-button layout-topbar-action" type="button" aria-label="Toggle navigation" (click)="layout.onMenuToggle()">
            <i class="pi pi-bars"></i>
        </button>

        <a class="layout-topbar-logo" routerLink="/">
            <img src="assets/images/cs-logo.png" alt="Schedverse logo" />
            <span>Schedverse</span>
        </a>

        @let rootMenus = rootMenus$ | async;

        <nav class="enterprise-root-nav" [class.enterprise-root-nav--scrollable]="(rootMenus?.length ?? 0) > 5" aria-label="Primary navigation">
            @let selected = selectedRoot$ | async;

            @for (menu of rootMenus; track menu.id) {
                <button type="button" class="enterprise-root-nav__item" [class.enterprise-root-nav__item--active]="isActive(menu, selected)" (click)="selectMenu(menu)">
                    {{ menu.topbarLabel || menu.label }}
                </button>
            }
        </nav>
    </div>

    <div class="layout-topbar-actions">
        <button class="layout-topbar-action" type="button" aria-label="More options" pStyleClass="@next" enterFromClass="hidden" enterActiveClass="animate-scalein" leaveToClass="hidden" leaveActiveClass="animate-fadeout" [hideOnOutsideClick]="true">
            <i class="pi pi-ellipsis-v"></i>
        </button>

        <button type="button" class="layout-topbar-action" aria-label="Calendar">
            <i class="pi pi-calendar"></i>
        </button>

        <button type="button" class="layout-topbar-action" aria-label="Inbox">
            <i class="pi pi-inbox"></i>
        </button>

        <button type="button" class="layout-topbar-action" aria-label="Profile">
            <i class="pi pi-user"></i>
        </button>

        <button type="button" class="enterprise-user-button" aria-label="User menu" (click)="userMenu.toggle($event)">
            <p-avatar [label]="initials()" shape="circle" class="topbar-avatar border border-gray-200"></p-avatar>

            <i class="pi pi-chevron-down text-xs text-gray-500"></i>
        </button>

        <p-menu #userMenu [popup]="true" [model]="userMenuItems" [style.--user-initials]="userInitialsCss()" styleClass="user-menu"></p-menu>
    </div>
</div>
