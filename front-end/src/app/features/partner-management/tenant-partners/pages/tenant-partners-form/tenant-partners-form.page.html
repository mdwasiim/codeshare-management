<form [formGroup]="form" class="p-fluid w-full block app-form">
    <app-form-section title="Partner Mapping Details">
        <div class="grid">
            <div class="field col-12 md:col-6">
                <label for="homeAirlineId" class="required">Host Airline</label>
                <p-select inputId="homeAirlineId" appendTo="body" [options]="lookupOptions['homeAirlineId'] || []" optionLabel="label" optionValue="value" [filter]="true" filterBy="label" [showClear]="true" formControlName="homeAirlineId" styleClass="w-full"></p-select>
                <small class="p-error" *ngIf="form.controls['homeAirlineId'].hasError('required') && form.controls['homeAirlineId'].touched">Host Airline is required.</small>
            </div>

            <div class="field col-12 md:col-6">
                <label for="partnerAirlineId" class="required">Partner Airline</label>
                <p-select inputId="partnerAirlineId" appendTo="body" [options]="lookupOptions['partnerAirlineId'] || []" optionLabel="label" optionValue="value" [filter]="true" filterBy="label" [showClear]="true" formControlName="partnerAirlineId" styleClass="w-full"></p-select>
                <small class="p-error" *ngIf="form.controls['partnerAirlineId'].hasError('required') && form.controls['partnerAirlineId'].touched">Partner Airline is required.</small>
            </div>

            <div class="field col-12 md:col-6">
                <label for="agreementNumber">Agreement No</label>
                <input id="agreementNumber" pInputText formControlName="agreementNumber" class="w-full" />
            </div>

            <div class="field col-12 md:col-6">
                <label for="agreementType">Agreement Type</label>
                <input id="agreementType" pInputText formControlName="agreementType" class="w-full" />
            </div>

            <div class="field col-12 md:col-6">
                <label for="agreementStatus">Agreement Status</label>
                <input id="agreementStatus" pInputText formControlName="agreementStatus" class="w-full" />
            </div>

            <div class="field col-12 md:col-6">
                <label for="recordStatus">Record Status</label>
                <p-select inputId="recordStatus" appendTo="body" [options]="recordStatusOptions" formControlName="recordStatus" styleClass="w-full"></p-select>
            </div>

            <div class="field col-12 md:col-6">
                <label for="effectiveFrom">Effective From</label>
                <input id="effectiveFrom" pInputText type="date" formControlName="effectiveFrom" class="w-full" />
            </div>

            <div class="field col-12 md:col-6">
                <label for="effectiveTo">Effective To</label>
                <input id="effectiveTo" pInputText type="date" formControlName="effectiveTo" class="w-full" />
            </div>

            <div class="field col-12 md:col-6">
                <label for="active">Active</label>
                <div class="flex align-items-center gap-2">
                    <p-checkbox inputId="active" formControlName="active" binary="true"></p-checkbox>
                    <label for="active" class="mb-0">Enabled</label>
                </div>
            </div>
        </div>
    </app-form-section>
</form>
