<form [formGroup]="form" class="p-fluid w-full">

    <div class="w-full">

        <csm-form-section title="Menu Details">

            <div class="grid">

                <!-- LABEL -->
                <div class="field col-12 md:col-6">

                    <label for="label">Label</label>

                    <input
                        id="label"
                        pInputText
                        formControlName="label"
                        class="w-full" />

                    <small
                        class="p-error"
                        *ngIf="form.controls['label'].invalid
                            && form.controls['label'].touched">

                        Label is required

                    </small>

                </div>

                <!-- ICON -->
                <div class="field col-12 md:col-6">

                    <label for="icon">Icon</label>

                    <input
                        id="icon"
                        pInputText
                        formControlName="icon"
                        placeholder="pi pi-home"
                        class="w-full" />

                </div>

                <!-- ROUTE -->
                <div class="field col-12">

                    <label for="route">Route</label>

                    <input
                        id="route"
                        pInputText
                        formControlName="route"
                        placeholder="/dashboard"
                        class="w-full" />

                </div>

                <!-- DISPLAY ORDER -->
                <div class="field col-12 md:col-6">

                    <label for="displayOrder">
                        Display Order
                    </label>

                    <input
                        id="displayOrder"
                        type="number"
                        pInputText
                        formControlName="displayOrder"
                        class="w-full" />

                </div>

                <!-- PARENT MENU -->
                <div class="field col-12 md:col-6">

                    <label for="parentId">
                        Parent Menu
                    </label>

                    <p-select
                        inputId="parentId"
                        appendTo="body"
                        [options]="menuOptions"
                        optionLabel="label"
                        optionValue="value"
                        formControlName="parentId"
                        placeholder="Select Parent"
                        [showClear]="true"
                        styleClass="w-full">
                    </p-select>

                </div>

                <!-- PERMISSION -->
                <div class="field col-12 md:col-6">

                    <label for="permission">
                        Permission
                    </label>

                    <p-select
                        inputId="permission"
                        appendTo="body"
                        formControlName="permission"
                        [options]="permissionOptions"
                        optionLabel="label"
                        optionValue="value"
                        placeholder="Select Permission"
                        styleClass="w-full">
                    </p-select>

                </div>

                <!-- GROUPS -->
                <div class="field col-12 md:col-6">

                    <label for="groupIds">
                        Groups
                    </label>

                    <p-multiSelect
                        inputId="groupIds"
                        appendTo="body"
                        formControlName="groupIds"
                        [options]="groups"
                        optionLabel="label"
                        optionValue="value"
                        placeholder="Select Groups"
                        display="chip"
                        styleClass="w-full">
                    </p-multiSelect>

                </div>

            </div>

        </csm-form-section>

    </div>

</form>
