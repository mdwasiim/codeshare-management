<!-- ============================= -->
<!--  Toolbar (Top Actions)        -->
<!-- ============================= -->
<csm-crud-toolbar
    [actions]="['create','delete','search']"
    [disableDelete]="!selectedMenus.length"

    (create)="openCreate()"
    (delete)="deleteSelectedMenus()"
    (search)="onSearch($event)">
</csm-crud-toolbar>

<p-treeTable
    [value]="data"
    [(selection)]="selectedMenus"
    dataKey="key"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[10,20,30]"
    [tableStyle]="{ 'min-width': '60rem' }"
>

    <!-- Header -->
    <ng-template pTemplate="header">
        <tr>
            <th style="width:3rem"></th>
            <th>Label</th>
            <th>Icon</th>
            <th>Route</th>
            <th>Order</th>
            <th></th>
        </tr>
    </ng-template>

    <!-- Body -->
    <ng-template pTemplate="body" let-rowNode let-rowData="rowData">
        <tr>
            <td>
                <p-treeTableToggler [rowNode]="rowNode"></p-treeTableToggler>
            </td>

            <!-- 🔥 USE rowData -->
            <td>{{ rowData?.label }}</td>
            <td>{{ rowData?.icon || '-' }}</td>
            <td>{{ rowData?.route || '-' }}</td>
            <td>{{ rowData?.displayOrder }}</td>

            <td class="flex gap-2">
                <p-button icon="pi pi-pencil"
                          (click)="openEdit(rowData)" />

                <p-button icon="pi pi-trash"
                          severity="danger"
                          (click)="deleteMenu(rowData)" />
            </td>
        </tr>
    </ng-template>

</p-treeTable>

<menu-form
    [(visible)]="dialogVisible"
    [id]="selectedMenuId"
    (saved)="onSaved()">
</menu-form>

<!-- ============================= -->
<!--  Global Confirm Dialog        -->
<!-- ============================= -->
<p-confirm-dialog></p-confirm-dialog>
<p-toast></p-toast>
