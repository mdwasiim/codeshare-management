<!-- ============================= -->
<!-- Toolbar -->
<!-- ============================= -->
<csm-crud-toolbar
    [actions]="['create','delete','search']"
    [disableDelete]="!selectedMenus.length"
    (create)="openCreate()"
    (delete)="deleteSelectedMenus()"
    (search)="onSearch($event)">
</csm-crud-toolbar>

<!-- ============================= -->
<!-- Tree Table -->
<!-- ============================= -->
<p-treeTable
    #dt
    [value]="data"
    [(selection)]="selectedMenus"
    dataKey="key"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[10,20,30]"
    [tableStyle]="{ 'min-width': '60rem' }"
>

    <!-- Header -->
    <ng-template pTemplate="header">
        <tr>
            <th style="width:3rem"></th>
            <th>Label</th>
            <th>Icon</th>
            <th>Route</th>
            <th>Order</th>
            <th style="width:120px"></th>
        </tr>
    </ng-template>

    <!-- Body -->
    <ng-template pTemplate="body" let-rowNode let-rowData="rowData">
        <tr>
            <td>
                <p-treeTableToggler [rowNode]="rowNode"></p-treeTableToggler>
            </td>

            <td>{{ rowData?.label }}</td>
            <td>{{ rowData?.icon || '-' }}</td>
            <td>{{ rowData?.route || '-' }}</td>
            <td>{{ rowData?.displayOrder }}</td>

            <td>
                <div class="flex gap-1 justify-center">
                    <p-button
                        icon="pi pi-pencil"
                        size="small"
                        text
                        pTooltip="Edit"
                        tooltipPosition="top"
                        (click)="openEdit(rowData)">
                    </p-button>

                    <p-button
                        icon="pi pi-trash"
                        size="small"
                        text
                        severity="danger"
                        pTooltip="Delete"
                        tooltipPosition="top"
                        (click)="deleteMenu(rowData)">
                    </p-button>
                </div>
            </td>
        </tr>
    </ng-template>

    <!-- Empty State -->
    <ng-template pTemplate="emptymessage">
        <tr>
            <td colspan="6" class="text-center py-6 text-gray-500">
                <i class="pi pi-sitemap text-2xl mb-2"></i>
                <div>No menus found</div>
            </td>
        </tr>
    </ng-template>

</p-treeTable>

<!-- ============================= -->
<!-- Dialog -->
<!-- ============================= -->
<menu-form
    [(visible)]="dialogVisible"
    [id]="selectedMenuId"
    (saved)="onSaved()">
</menu-form>
