<p-dialog
    [(visible)]="visible"
    [modal]="true"
    [style]="{ width: '540px' }"
    [draggable]="false"
    [resizable]="false"
    [header]="isEdit ? 'Edit Tenant' : 'Create Tenant'">

    <form [formGroup]="form" class="p-fluid">

        <!-- SECTION -->
        <div class="mb-4">
            <div class="text-700 font-semibold text-sm mb-3">
                Basic Information
            </div>

            <div class="grid formgrid">

                <div class="col-12 md:col-6">
                    <div class="field">
                        <label for="name">Name</label>
                        <input id="name" pInputText formControlName="name" />
                    </div>
                </div>

                <div class="col-12 md:col-6">
                    <div class="field">
                        <label for="code">Code</label>
                        <input id="code" pInputText formControlName="code" />
                    </div>
                </div>

                <div class="col-12">
                    <div class="field">
                        <label for="description">Description</label>
                        <input id="description" pInputText formControlName="description" />
                    </div>
                </div>

            </div>
        </div>

        <!-- SECTION -->
        <div class="mb-2">
            <div class="text-700 font-semibold text-sm mb-3">
                Configuration
            </div>

            <div class="grid formgrid">

                <div class="col-12 md:col-6">
                    <div class="field">
                        <label for="status">Status</label>
                        <p-select
                            inputId="status"
                            formControlName="status"
                            [options]="statusOptions"
                            styleClass="w-full">
                        </p-select>
                    </div>
                </div>

                <div class="col-12 md:col-6">
                    <div class="field">
                        <label for="plan">Plan</label>
                        <p-select
                            inputId="plan"
                            formControlName="plan"
                            [options]="planOptions"
                            styleClass="w-full">
                        </p-select>
                    </div>
                </div>

            </div>
        </div>

    </form>

    <!-- FOOTER -->
    <ng-template pTemplate="footer">
        <div class="flex justify-end gap-2">

            <button
                pButton
                label="Cancel"
                class="p-button-text"
                (click)="visibleChange.emit(false)"
                type="button">
            </button>

            <button
                pButton
                label="Save"
                icon="pi pi-check"
                [disabled]="form.invalid"
                (click)="submit()"
                type="button">
            </button>

        </div>
    </ng-template>

</p-dialog>
