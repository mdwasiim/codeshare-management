<p-dialog
    [(visible)]="visible"
    [modal]="true"
    [style]="{ width: '500px' }"
    [header]="isEdit ? 'Edit Role' : 'Create Role'">

    <form [formGroup]="form" class="p-fluid">

        <div class="grid grid-cols-2 gap-3">

            <input pInputText placeholder="Code" formControlName="code" />

            <input pInputText placeholder="Name" formControlName="name" />

            <input pInputText placeholder="Description" formControlName="description" />

            <input pInputText placeholder="Tenant ID" formControlName="tenantId" />

        </div>

        <div class="flex justify-end gap-2 mt-4">

            <button
                pButton
                label="Cancel"
                class="p-button-text"
                (click)="visibleChange.emit(false)"
                type="button">
            </button>

            <button
                pButton
                label="Save"
                icon="pi pi-check"
                (click)="submit()"
                [disabled]="form.invalid || loading"
                type="button">
            </button>

        </div>

    </form>

</p-dialog>
