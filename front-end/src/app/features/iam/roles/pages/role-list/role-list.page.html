<!-- ============================= -->
<!-- Toolbar                      -->
<!-- ============================= -->
<csm-crud-toolbar
    [actions]="['create','delete','search']"
    [disableDelete]="!selectedRoles.length"
    (create)="openCreate()"
    (delete)="deleteSelectedRoles()"
    (search)="onSearch($event)">
</csm-crud-toolbar>

<!-- ============================= -->
<!-- Table                        -->
<!-- ============================= -->
<p-table
    #dt
    [value]="data"
    [loading]="loading"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[10,20,50]"
    [(selection)]="selectedRoles"
    dataKey="id"
    [rowHover]="true"
    [globalFilterFields]="['code','name','description']"
>

    <!-- Header -->
    <ng-template pTemplate="header">
        <tr>
            <th style="width:3rem">
                <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
            </th>

            <th>Code</th>
            <th>Name</th>
            <th>Description</th>
            <th>Tenant</th>
            <th></th>
        </tr>
    </ng-template>

    <!-- Body -->
    <ng-template pTemplate="body" let-role>
        <tr>
            <td>
                <p-tableCheckbox [value]="role"></p-tableCheckbox>
            </td>

            <td>{{ role.code }}</td>
            <td>{{ role.name }}</td>
            <td>{{ role.description }}</td>

            <td>
                <p-tag [value]="role.tenantId" severity="info"></p-tag>
            </td>

            <td class="flex gap-2">
                <p-button icon="pi pi-pencil"
                          [rounded]="true"
                          [outlined]="true"
                          (click)="openEdit(role)">
                </p-button>

                <p-button icon="pi pi-trash"
                          severity="danger"
                          [rounded]="true"
                          [outlined]="true"
                          (click)="deleteRole(role)">
                </p-button>
            </td>
        </tr>
    </ng-template>

</p-table>

<!-- ============================= -->
<!-- Dialog                       -->
<!-- ============================= -->
<role-form
    [(visible)]="dialogVisible"
    [id]="selectedRoleId"
    (saved)="onSaved()">
</role-form>

<!-- ============================= -->
<!-- Confirm + Toast              -->
<!-- ============================= -->
<p-confirmDialog></p-confirmDialog>
<p-toast></p-toast>

<!-- ============================= -->
<!-- Empty State                  -->
<!-- ============================= -->
<div *ngIf="!loading && data.length === 0" class="text-center mt-4">
    No roles found
</div>
