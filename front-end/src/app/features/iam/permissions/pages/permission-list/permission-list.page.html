<csm-crud-toolbar
    [actions]="['create','delete','search']"
    [permissions]="permissions"
    [hasSelection]="selectedPermissions.length > 0"
    (create)="openCreate()"
    (delete)="deleteSelectedPermissions()"
    (export)="exportCSV()"
    (search)="onSearch($event)">
</csm-crud-toolbar>

<p-table
    #dt
    [value]="data"
    [loading]="loading"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[10,20,50]"
    [(selection)]="selectedPermissions"
    dataKey="id"
    [rowHover]="true"
    [globalFilterFields]="['name','domain','action','code','tenantName']"
>

    <ng-template pTemplate="header">
        <tr>
            <th style="width:3rem">
                <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
            </th>

            <th pSortableColumn="name">Name <p-sortIcon field="name"></p-sortIcon></th>
            <th>Tenant</th>
            <th pSortableColumn="domain">Domain <p-sortIcon field="domain"></p-sortIcon></th>
            <th pSortableColumn="action">Action <p-sortIcon field="action"></p-sortIcon></th>
            <th pSortableColumn="code">Code <p-sortIcon field="code"></p-sortIcon></th>
            <th>Description</th>
            <th></th>
        </tr>
    </ng-template>

    <ng-template pTemplate="body" let-p>
        <tr>
            <td>
                <p-tableCheckbox [value]="p"></p-tableCheckbox>
            </td>

            <td>{{ p.name }}</td>

            <td>{{ p.tenantName || p.tenant?.name || '-' }}</td>

            <td><p-tag [value]="p.domain" severity="info"></p-tag></td>
            <td><p-tag [value]="p.action" severity="success"></p-tag></td>

            <td>
                <p-tag [value]="p.code" severity="warn"></p-tag>
            </td>

            <td>{{ p.description }}</td>

            <td class="flex gap-2">
                <div class="flex gap-1 justify-center">
                    <p-button
                        icon="pi pi-pencil"
                        size="small"
                        text
                        pTooltip="Edit"
                        tooltipPosition="top"
                        (click)="openEdit(p)">
                    </p-button>

                    <p-button
                        icon="pi pi-trash"
                        size="small"
                        text
                        severity="danger"
                        pTooltip="Delete"
                        tooltipPosition="top"
                        (click)="deletePermission(p)">
                    </p-button>
                </div>
            </td>
        </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
        <tr>
            <td colspan="7" class="text-center py-4">
                No permissions found
            </td>
        </tr>
    </ng-template>

</p-table>

<!-- ============================= -->
<!-- Dialog                       -->
<!-- ============================= -->
<permission-form
    [(visible)]="dialogVisible"
    [id]="selectedPermissionId"
    (saved)="onSaved()">
</permission-form>
