<div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-semibold">Permissions</h2>

    <p-button
        label="Create Permission"
        icon="pi pi-plus"
        (click)="createPermission()">
    </p-button>
</div>

<p-table
    [value]="data"
    [paginator]="true"
    [rows]="10"
    [rowHover]="true"
    dataKey="id"
    [globalFilterFields]="['name','domain','action']"
>

    <!-- Header -->
    <ng-template pTemplate="header">
        <tr>
            <th pSortableColumn="name">
                Name
                <p-sortIcon field="name"></p-sortIcon>
            </th>
            <th>Domain</th>
            <th>Action</th>
            <th>Code</th>
            <th>Description</th>
            <th></th>
        </tr>
    </ng-template>

    <!-- Body -->
    <ng-template pTemplate="body" let-p>
        <tr>
            <td>{{ p.name }}</td>
            <td>
                <p-tag [value]="p.domain" severity="info"></p-tag>
            </td>
            <td>
                <p-tag [value]="p.action" severity="success"></p-tag>
            </td>
            <td>{{ p.code }}</td>
            <td>{{ p.description }}</td>

            <td class="flex gap-2">
                <p-button
                    icon="pi pi-pencil"
                    [rounded]="true"
                    [outlined]="true"
                    (click)="editPermission(p)">
                </p-button>

                <p-button
                    icon="pi pi-trash"
                    severity="danger"
                    [rounded]="true"
                    [outlined]="true"
                    (click)="deletePermission(p)">
                </p-button>
            </td>
        </tr>
    </ng-template>

</p-table>

<div *ngIf="!loading && data.length === 0" class="text-center mt-4">
    No permissions found
</div>
