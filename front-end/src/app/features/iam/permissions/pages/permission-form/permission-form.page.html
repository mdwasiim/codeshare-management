<csm-dialog
    [(visible)]="visible"
    [title]="isEdit ? 'Edit Permission' : 'Create Permission'"
    [width]="'600px'"
    [disableSave]="form.invalid"
    (save)="submit()">

    <form [formGroup]="form" class="p-fluid">

        <csm-form-section title="Permission Details">
            <div class="grid formgrid">

                <div class="col-12 md:col-6 field">
                    <label>Name</label>
                    <input pInputText formControlName="name" class="w-full" />
                </div>

                <div class="col-12 md:col-6 field">
                    <label>Tenant</label>
                    <p-select
                        [options]="tenants"
                        optionLabel="name"
                        optionValue="id"
                        formControlName="tenantId"
                        styleClass="w-full">
                    </p-select>
                </div>

                <div class="col-12 md:col-6 field">
                    <label>Domain</label>
                    <p-select
                        [options]="domains"
                        optionLabel="name"
                        optionValue="code"
                        formControlName="domain"
                        styleClass="w-full">
                    </p-select>
                </div>

                <div class="col-12 md:col-6 field">
                    <label>Action</label>
                    <p-select
                        [options]="actions"
                        optionLabel="name"
                        optionValue="code"
                        formControlName="action"
                        styleClass="w-full">
                    </p-select>
                </div>

                <div class="col-12 field">
                    <label>Description</label>
                    <input pInputText formControlName="description" class="w-full" />
                </div>

            </div>
        </csm-form-section>

    </form>

</csm-dialog>
