<p-dialog
    [(visible)]="visible"
    [modal]="true"
    [style]="{ width: '500px' }"
    [header]="isEdit ? 'Edit Permission' : 'Create Permission'">

    <form [formGroup]="form" class="p-fluid">

        <div class="grid grid-cols-2 gap-3">

            <!-- Name -->
            <input pInputText placeholder="Name" formControlName="name" />

            <!-- Tenant -->
            <p-select
                [options]="tenants"
                optionLabel="name"
                optionValue="id"
                placeholder="Select Tenant"
                formControlName="tenantId">
            </p-select>

            <!-- Domain -->
            <p-select
                [options]="domains"
                optionLabel="name"
                optionValue="code"
                placeholder="Select Domain"
                formControlName="domain">
            </p-select>

            <!-- Action -->
            <p-select
                [options]="actions"
                optionLabel="name"
                optionValue="code"
                placeholder="Select Action"
                formControlName="action">
            </p-select>

            <!-- Description -->
            <div class="col-span-2">
                <input pInputText placeholder="Description" formControlName="description" />
            </div>

        </div>

        <div class="flex justify-end gap-2 mt-4">

            <button
                pButton
                label="Cancel"
                class="p-button-text"
                (click)="visibleChange.emit(false)"
                type="button">
            </button>

            <button
                pButton
                label="Save"
                icon="pi pi-check"
                (click)="submit()"
                type="button">
            </button>

        </div>

    </form>
</p-dialog>
