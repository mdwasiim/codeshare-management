
<!-- Toolbar -->
<csm-crud-toolbar
    [actions]="['create','delete','export','search']"
    [permissions]="permissions"
    [hasSelection]="selectedUsers.length > 0"
    (create)="openCreate()"
    (delete)="deleteSelectedUsers()"
    (export)="exportCSV()"
    (search)="onSearch($event)">
</csm-crud-toolbar>

<!-- Table -->
<p-table
    #dt
    [value]="data"
    [loading]="loading"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[10,20,50]"
    [(selection)]="selectedUsers"
    dataKey="id"
    [rowHover]="true"
    responsiveLayout="scroll"
    class="p-datatable-sm"
    [tableStyle]="{ 'min-width': '60rem' }"
    [globalFilterFields]="['username','email','firstName','lastName']"
>

    <ng-template pTemplate="caption">
        <div class="flex justify-between items-center">
            <h5 class="m-0">Manage Users</h5>
        </div>
    </ng-template>

    <ng-template pTemplate="header">
        <tr>
            <th style="width:3rem">
                <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
            </th>

            <th pSortableColumn="username">
                Username
                <p-sortIcon field="username"></p-sortIcon>
            </th>

            <th>Email</th>
            <th>Name</th>
            <th>Tenant</th>
            <th>Status</th>
            <th style="width:10rem"></th>
        </tr>
    </ng-template>

    <ng-template pTemplate="body" let-user>
        <tr>
            <td>
                <p-tableCheckbox [value]="user"></p-tableCheckbox>
            </td>

            <td>{{ user.username }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.firstName }} {{ user.lastName }}</td>
            <td>{{ user.tenant?.name }}</td>

            <td>
                <p-tag
                    [value]="user.enabled ? 'Active' : 'Disabled'"
                    [severity]="user.enabled ? 'success' : 'danger'">
                </p-tag>
            </td>

            <td>
                <div class="flex gap-1 justify-center">
                    <p-button
                        *ngIf="permissions.canCreate"
                        icon="pi pi-pencil"
                        size="small"
                        text
                        pTooltip="Edit"
                        tooltipPosition="top"
                        (click)="openEdit(user)">
                    </p-button>

                    <p-button
                        *ngIf="permissions.canDelete"
                        icon="pi pi-trash"
                        size="small"
                        text
                        severity="danger"
                        pTooltip="Delete"
                        tooltipPosition="top"
                        (click)="deleteUser(user)">
                    </p-button>
                </div>
            </td>
        </tr>
    </ng-template>

    <!-- ✅ Better empty state -->
    <ng-template pTemplate="emptymessage">
        <tr>
            <td colspan="7" class="text-center py-6 text-gray-500">
                <i class="pi pi-users text-2xl mb-2"></i>
                <div>No users found</div>
            </td>
        </tr>
    </ng-template>

</p-table>

<!-- Dialog -->
<user-form
    [(visible)]="dialogVisible"
    [id]="selectedUserId"
    (saved)="onSaved()">
</user-form>
