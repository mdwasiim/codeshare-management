<!-- ============================= -->
<!-- Toolbar                      -->
<!-- ============================= -->
<csm-crud-toolbar
    [actions]="['create','delete','export','search']"
    [disableDelete]="!selectedUsers.length"
    (create)="createUser()"
    (delete)="deleteSelectedUsers()"
    (export)="exportCSV()"
    (search)="onGlobalFilter(dt, $event)">
</csm-crud-toolbar>


<!-- ============================= -->
<!-- Users Table                  -->
<!-- ============================= -->
<p-table
    #dt
    [value]="data"
    [loading]="loading"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[10,20,50]"
    [(selection)]="selectedUsers"
    dataKey="id"
    [rowHover]="true"
    responsiveLayout="scroll"
    class="p-datatable-sm"
    [globalFilterFields]="['username','email','firstName','lastName']"
>

    <!-- Caption -->
    <ng-template pTemplate="caption">
        <div class="flex justify-between items-center">
            <h5 class="m-0">Manage Users</h5>

            <span class="p-input-icon-left">
                <i class="pi pi-search"></i>
                <input
                    #searchInput
                    pInputText
                    type="text"
                    (input)="onGlobalFilter(dt, searchInput.value)"
                    placeholder="Search..." />
            </span>
        </div>
    </ng-template>

    <!-- Header -->
    <ng-template pTemplate="header">
        <tr>
            <th style="width:3rem">
                <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
            </th>

            <th pSortableColumn="username">
                Username
                <p-sortIcon field="username"></p-sortIcon>
            </th>

            <th>Email</th>
            <th>Name</th>
            <th>Tenant</th>
            <th>Status</th>

            <th style="width:10rem"></th>
        </tr>
    </ng-template>

    <!-- Body -->
    <ng-template pTemplate="body" let-user>
        <tr>
            <td>
                <p-tableCheckbox [value]="user"></p-tableCheckbox>
            </td>

            <td>{{ user.username }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.firstName }} {{ user.lastName }}</td>
            <td>{{ user.tenant.name }}</td>

            <td>
                <p-tag
                    [value]="user.enabled ? 'Active' : 'Disabled'"
                    [severity]="user.enabled ? 'success' : 'danger'">
                </p-tag>
            </td>

            <td class="flex gap-2">
                <p-button
                    icon="pi pi-pencil"
                    [rounded]="true"
                    [outlined]="true"
                    (click)="editUser(user)">
                </p-button>

                <p-button
                    icon="pi pi-trash"
                    severity="danger"
                    [rounded]="true"
                    [outlined]="true"
                    (click)="deleteUser(user)">
                </p-button>
            </td>
        </tr>
    </ng-template>

</p-table>


<!-- ============================= -->
<!-- Confirm Dialog               -->
<!-- ============================= -->
<p-confirmDialog></p-confirmDialog>


<!-- ============================= -->
<!-- Empty State                  -->
<!-- ============================= -->
<div *ngIf="!loading && data.length === 0" class="text-center mt-6 text-gray-500">
    <i class="pi pi-users text-3xl mb-2"></i>
    <div>No users found</div>
</div>
