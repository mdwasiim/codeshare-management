<p-dialog
    [(visible)]="visible"
    [modal]="true"
    [style]="{ width: '800px' }"
    [header]="isEdit ? 'Edit User' : 'Create User'">

    <form [formGroup]="form" class="p-fluid">

        <!-- USER INFO -->
        <div class="mb-4">
            <h3 class="font-semibold mb-3">User Info</h3>

            <div class="grid grid-cols-2 gap-3">

                <input pInputText placeholder="Username" formControlName="username" />
                <input pInputText placeholder="Email" formControlName="email" />

                <input pInputText placeholder="First Name" formControlName="firstName" />
                <input pInputText placeholder="Last Name" formControlName="lastName" />

                <div class="col-span-2">
                    <p-password formControlName="password" placeholder="Password"></p-password>
                </div>

            </div>
        </div>

        <!-- ACCOUNT FLAGS -->
        <div class="mb-4">
            <h3 class="font-semibold mb-3">Account Settings</h3>

            <div class="flex flex-wrap gap-4">
                <p-checkbox formControlName="enabled" binary="true" label="Enabled"></p-checkbox>
                <p-checkbox formControlName="accountNonLocked" binary="true" label="Unlocked"></p-checkbox>
                <p-checkbox formControlName="accountNonExpired" binary="true" label="Account Valid"></p-checkbox>
                <p-checkbox formControlName="credentialsNonExpired" binary="true" label="Credentials Valid"></p-checkbox>
            </div>
        </div>

        <!-- AUTH / SYSTEM -->
        <div class="mb-4">
            <h3 class="font-semibold mb-3">Auth & System</h3>

            <div class="grid grid-cols-2 gap-3">

                <!-- ✅ FIXED -->
                <p-select
                    [options]="[
                        { label: 'INTERNAL', value: 'INTERNAL' },
                        { label: 'LDAP', value: 'LDAP' },
                        { label: 'OAUTH', value: 'OAUTH' }
                    ]"
                    placeholder="Auth Source"
                    formControlName="authSource">
                </p-select>

                <!-- ✅ FIXED -->
                <p-select
                    [options]="[
                        { label: 'ACTIVE', value: 'ACTIVE' },
                        { label: 'INACTIVE', value: 'INACTIVE' }
                    ]"
                    placeholder="Record Status"
                    formControlName="recordStatus">
                </p-select>

                <input pInputText placeholder="External ID" formControlName="externalId" />
                <input pInputText placeholder="Last Login Provider" formControlName="lastLoginProvider" />

            </div>
        </div>

        <!-- TENANT -->
        <div class="mb-4">
            <h3 class="font-semibold mb-3">Tenant</h3>

            <!-- ✅ FIXED -->
            <p-select
                [options]="tenants"
                optionLabel="name"
                optionValue="id"
                placeholder="Select Tenant"
                formControlName="tenantId">
            </p-select>
        </div>

        <!-- ACTIONS -->
        <div class="flex justify-end gap-2 mt-4">

            <button
                pButton
                label="Cancel"
                class="p-button-text"
                (click)="visibleChange.emit(false)"
                type="button">
            </button>

            <button
                pButton
                label="Save"
                icon="pi pi-check"
                (click)="submit()"
                type="button">
            </button>

        </div>

    </form>
</p-dialog>
