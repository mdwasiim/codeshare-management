<csm-dialog
    [(visible)]="visible"
    [title]="isEdit ? 'Edit User' : 'Create User'"
    [width]="'800px'"
    [disableSave]="form.invalid"
    (save)="submit()">

    <form [formGroup]="form" class="p-fluid">

        <!-- USER INFO -->
        <csm-form-section title="User Information">
            <div class="grid formgrid">

                <div class="col-12 md:col-6 field">
                    <label>Username</label>
                    <input pInputText formControlName="username" class="w-full" />
                </div>

                <div class="col-12 md:col-6 field">
                    <label>Email Address</label>
                    <input pInputText formControlName="email" class="w-full" />
                </div>

                <div class="col-12 md:col-6 field">
                    <label>First Name</label>
                    <input pInputText formControlName="firstName" class="w-full" />
                </div>

                <div class="col-12 md:col-6 field">
                    <label>Last Name</label>
                    <input pInputText formControlName="lastName" class="w-full" />
                </div>

                <div class="col-12 field">
                    <label>Password</label>
                    <p-password
                        formControlName="password"
                        [toggleMask]="true"
                        [feedback]="false"
                        styleClass="w-full">
                    </p-password>
                </div>

            </div>
        </csm-form-section>

        <!-- ACCOUNT FLAGS -->
        <csm-form-section title="Account Settings">
            <div class="grid formgrid">

                <div class="col-12 flex flex-wrap gap-3">
                    <p-checkbox formControlName="enabled" binary="true" label="Enabled"></p-checkbox>

                    <p-checkbox formControlName="accountNonLocked" binary="true" label="Account Unlocked"></p-checkbox>

                    <p-checkbox formControlName="accountNonExpired" binary="true" label="Account Active"></p-checkbox>

                    <p-checkbox formControlName="credentialsNonExpired" binary="true" label="Credentials Valid"></p-checkbox>
                </div>

            </div>
        </csm-form-section>

        <!-- AUTH -->
        <csm-form-section title="Authentication & System">
            <div class="grid formgrid">

                <div class="col-12 md:col-6 field">
                    <label>Authentication Source</label>
                    <p-select
                        [options]="[
                            { label: 'Internal', value: 'INTERNAL' },
                            { label: 'LDAP', value: 'LDAP' },
                            { label: 'OAuth', value: 'OAUTH' }
                        ]"
                        formControlName="authSource"
                        styleClass="w-full">
                    </p-select>
                </div>

                <div class="col-12 md:col-6 field">
                    <label>Record Status</label>
                    <p-select
                        [options]="[
                            { label: 'Active', value: 'ACTIVE' },
                            { label: 'Inactive', value: 'INACTIVE' }
                        ]"
                        formControlName="recordStatus"
                        styleClass="w-full">
                    </p-select>
                </div>

                <div class="col-12 md:col-6 field">
                    <label>External ID</label>
                    <input pInputText formControlName="externalId" class="w-full" />
                </div>

                <div class="col-12 md:col-6 field">
                    <label>Last Login Provider</label>
                    <input pInputText formControlName="lastLoginProvider" class="w-full" />
                </div>

            </div>
        </csm-form-section>

        <!-- TENANT -->
        <csm-form-section title="Tenant">
            <div class="grid formgrid">

                <div class="col-12 md:col-6 field">
                    <label>Tenant</label>
                    <p-select
                        [options]="tenants"
                        optionLabel="name"
                        optionValue="id"
                        formControlName="tenantId"
                        styleClass="w-full">
                    </p-select>
                </div>

            </div>
        </csm-form-section>

    </form>

</csm-dialog>
