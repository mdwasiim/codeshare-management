<p-dialog
    [(visible)]="visible"
    [modal]="true"
    [style]="{ width: '500px' }"
    [header]="isEdit ? 'Edit Group' : 'Create Group'">

    <form [formGroup]="form" class="p-fluid">

        <div class="grid grid-cols-2 gap-3">

            <input pInputText placeholder="Code" formControlName="code" />

            <input pInputText placeholder="Name" formControlName="name" />

            <input pInputText placeholder="Description" formControlName="description" />

            <p-select
                [options]="tenants"
                optionLabel="name"
                optionValue="id"
                placeholder="Select Tenant"
                formControlName="tenantId">
            </p-select>

        </div>

        <div class="flex justify-end gap-2 mt-4">

            <!-- Cancel -->
            <button
                pButton
                label="Cancel"
                class="p-button-text"
                (click)="visibleChange.emit(false)"
                type="button">
            </button>

            <!-- Save -->
            <button
                pButton
                label="Save"
                icon="pi pi-check"
                (click)="submit()"
                [disabled]="form.invalid || loading"
                type="button">
            </button>

        </div>

    </form>

</p-dialog>
