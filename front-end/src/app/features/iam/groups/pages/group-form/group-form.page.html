<form [formGroup]="form" (ngSubmit)="submit()" class="card max-w-3xl mx-auto p-6">

    <h2 class="text-xl font-semibold mb-6">
        {{ isEdit ? 'Edit Group' : 'Create Group' }}
    </h2>

    <div class="grid grid-cols-2 gap-4">

        <input pInputText placeholder="Code" formControlName="code" />

        <input pInputText placeholder="Name" formControlName="name" />

        <input pInputText placeholder="Description" formControlName="description" />

        <input pInputText placeholder="Tenant ID" formControlName="tenantId" />

    </div>

    <div class="mt-6">
        <p-button
            type="submit"
            label="Save"
            icon="pi pi-check"
            [disabled]="form.invalid">
        </p-button>
    </div>

</form>
