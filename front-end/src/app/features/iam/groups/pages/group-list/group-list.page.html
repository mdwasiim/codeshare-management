<div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-semibold">Groups</h2>

    <p-button
        label="Create Group"
        icon="pi pi-plus"
        (click)="createGroup()">
    </p-button>
</div>

<p-table
    [value]="data"
    [paginator]="true"
    [rows]="10"
    [rowHover]="true"
    dataKey="id"
>

    <!-- Header -->
    <ng-template pTemplate="header">
        <tr>
            <th>Code</th>
            <th>Name</th>
            <th>Description</th>
            <th>Tenant</th>
            <th></th>
        </tr>
    </ng-template>

    <!-- Body -->
    <ng-template pTemplate="body" let-group>
        <tr>
            <td>{{ group.code }}</td>
            <td>{{ group.name }}</td>
            <td>{{ group.description }}</td>

            <td>
                <p-tag [value]="group.tenantId" severity="info"></p-tag>
            </td>

            <td class="flex gap-2">
                <p-button
                    icon="pi pi-pencil"
                    [rounded]="true"
                    [outlined]="true"
                    (click)="editGroup(group)">
                </p-button>

                <p-button
                    icon="pi pi-trash"
                    severity="danger"
                    [rounded]="true"
                    [outlined]="true"
                    (click)="deleteGroup(group)">
                </p-button>
            </td>
        </tr>
    </ng-template>

</p-table>

<div *ngIf="!loading && data.length === 0" class="text-center mt-4">
    No groups found
</div>
