<div class="card">

    <!-- Toolbar -->
    <div class="flex justify-between items-center mb-4">

        <p-button
            label="Create Organization"
            icon="pi pi-plus"
            (click)="create()">
        </p-button>

        <span class="p-input-icon-left">
            <i class="pi pi-search"></i>
            <input
                pInputText
                type="text"
                placeholder="Search..."
                (input)="onSearch($event)" />
        </span>

    </div>

    <!-- Table -->
    <p-table
        #dt
        [value]="data"
        [paginator]="true"
        [rows]="10"
        [loading]="loading"
        [rowHover]="true"
        dataKey="id"
        [globalFilterFields]="['name','code','status']"
    >

        <!-- Header -->
        <ng-template pTemplate="header">
            <tr>
                <th pSortableColumn="name">
                    Name <p-sortIcon field="name"></p-sortIcon>
                </th>
                <th pSortableColumn="code">
                    Code <p-sortIcon field="code"></p-sortIcon>
                </th>
                <th>Status</th>
                <th style="width:150px"></th>
            </tr>
        </ng-template>

        <!-- Body -->
        <ng-template pTemplate="body" let-org>
            <tr>
                <td>{{ org.name }}</td>
                <td>{{ org.code }}</td>

                <td>
                    <p-tag
                        [value]="org.status"
                        [severity]="org.status === 'ACTIVE' ? 'success' : 'danger'">
                    </p-tag>
                </td>

                <td class="flex gap-2">
                    <p-button
                        icon="pi pi-pencil"
                        [rounded]="true"
                        [outlined]="true"
                        (click)="edit(org)">
                    </p-button>

                    <p-button
                        icon="pi pi-trash"
                        severity="danger"
                        [rounded]="true"
                        [outlined]="true"
                        (click)="delete(org)">
                    </p-button>
                </td>
            </tr>
        </ng-template>

    </p-table>

    <!-- Empty -->
    <div *ngIf="!loading && data.length === 0" class="text-center mt-4">
        No organizations found
    </div>

</div>
