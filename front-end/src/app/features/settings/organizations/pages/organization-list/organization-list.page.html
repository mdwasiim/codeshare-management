<!-- ============================= -->
<!-- Toolbar                      -->
<!-- ============================= -->
<csm-crud-toolbar
    [actions]="['create','delete','search']"
    [disableDelete]="!selectedOrganizations.length"
    (create)="openCreate()"
    (delete)="deleteSelectedOrganizations()"
    (search)="onSearch($event)">
</csm-crud-toolbar>

<!-- ============================= -->
<!-- Table                        -->
<!-- ============================= -->
<p-table
    #dt
    [value]="data"
    [loading]="loading"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[10,20,50]"
    [(selection)]="selectedOrganizations"
    dataKey="id"
    [rowHover]="true"
    [globalFilterFields]="['name','code','status']"
>

    <!-- Header -->
    <ng-template pTemplate="header">
        <tr>
            <th style="width:3rem">
                <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
            </th>

            <th>Name</th>
            <th>Code</th>
            <th>Status</th>
            <th></th>
        </tr>
    </ng-template>

    <!-- Body -->
    <ng-template pTemplate="body" let-org>
        <tr>
            <td>
                <p-tableCheckbox [value]="org"></p-tableCheckbox>
            </td>

            <td>{{ org.name }}</td>
            <td>{{ org.code }}</td>

            <td>
                <p-tag
                    [value]="org.status"
                    [severity]="org.status === 'ACTIVE' ? 'success' : 'danger'">
                </p-tag>
            </td>

            <td class="flex gap-2">
                <p-button icon="pi pi-pencil"
                          [rounded]="true"
                          [outlined]="true"
                          (click)="openEdit(org)">
                </p-button>

                <p-button icon="pi pi-trash"
                          severity="danger"
                          [rounded]="true"
                          [outlined]="true"
                          (click)="deleteOrganization(org)">
                </p-button>
            </td>
        </tr>
    </ng-template>

</p-table>

<!-- ============================= -->
<!-- Dialog                       -->
<!-- ============================= -->
<organization-form
    [(visible)]="dialogVisible"
    [id]="selectedOrganizationId"
    (saved)="onSaved()">
</organization-form>

<!-- ============================= -->
<!-- Confirm + Toast              -->
<!-- ============================= -->
<p-confirmDialog></p-confirmDialog>
<p-toast></p-toast>

<!-- ============================= -->
<!-- Empty State                  -->
<!-- ============================= -->
<div *ngIf="!loading && data.length === 0" class="text-center mt-4">
    No organizations found
</div>
