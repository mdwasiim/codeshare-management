<p-dialog
    [(visible)]="visible"
    [modal]="true"
    [style]="{ width: '500px' }"
    [header]="isEdit ? 'Edit Organization' : 'Create Organization'">

    <form [formGroup]="form" class="p-fluid">

        <div class="grid grid-cols-2 gap-3">

            <input pInputText placeholder="Name" formControlName="name" />

            <input pInputText placeholder="Code" formControlName="code" />

            <p-select
                [options]="statusOptions"
                optionLabel="label"
                optionValue="value"
                formControlName="status"
                placeholder="Select Status">
            </p-select>

        </div>

        <div class="flex justify-end gap-2 mt-4">

            <button
                pButton
                label="Cancel"
                class="p-button-text"
                (click)="visibleChange.emit(false)"
                type="button">
            </button>

            <button
                pButton
                label="Save"
                icon="pi pi-check"
                (click)="submit()"
                [disabled]="form.invalid || loading"
                type="button">
            </button>

        </div>

    </form>

</p-dialog>
