<form [formGroup]="form" (ngSubmit)="submit()" class="card max-w-3xl mx-auto p-6">

    <h2 class="text-xl font-semibold mb-6">
        {{ isEdit ? 'Edit Organization' : 'Create Organization' }}
    </h2>

    <div class="grid grid-cols-2 gap-4">

        <input
            pInputText
            placeholder="Name"
            formControlName="name" />

        <input
            pInputText
            placeholder="Code"
            formControlName="code" />

        <p-select
            [options]="statusOptions"
            optionLabel="label"
            optionValue="value"
            formControlName="status"
            placeholder="Select Status">
        </p-select>

    </div>

    <div class="mt-6 flex gap-2">

        <p-button
            type="submit"
            label="Save"
            icon="pi pi-check"
            [disabled]="form.invalid">
        </p-button>

        <p-button
            type="button"
            label="Cancel"
            icon="pi pi-times"
            severity="secondary"
            (click)="navigateBack('/settings/organizations')">
        </p-button>

    </div>

</form>
