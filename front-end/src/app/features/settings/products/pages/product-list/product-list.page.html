<!-- ============================= -->
<!--  Toolbar (Top Actions)        -->
<!-- ============================= -->
<csm-crud-toolbar
    [actions]="['create','delete','export','search']"
    [hasSelection]="!selectedProducts?.length"
    (create)="openNew()"
    (delete)="deleteSelectedProducts()"
    (export)="exportCSV()"
    (search)="onGlobalFilter(dt, $event)">
</csm-crud-toolbar>


<!-- ============================= -->
<!--  Products Table               -->
<!-- ============================= -->
<p-table
    #dt
    [value]="products()"
    [rows]="10"
    [columns]="cols"
    [paginator]="true"
    [globalFilterFields]="['name', 'country.name', 'representative.name', 'status']"
    [tableStyle]="{ 'min-width': '75rem' }"
    [(selection)]="selectedProducts"
    [rowHover]="true"
    dataKey="id"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} products"
    [showCurrentPageReport]="true"
    [rowsPerPageOptions]="[10, 20, 30]"
>
    <!-- Table Caption -->
    <ng-template #caption>
        <div class="flex items-center justify-between">
            <h5 class="m-0">Manage Products</h5>

            <p-iconfield>
                <p-inputicon styleClass="pi pi-search" />
                <input
                    #searchInput
                    pInputText
                    type="text"
                    (input)="onGlobalFilter(dt, searchInput.value)"
                    placeholder="Search..."
                />
            </p-iconfield>
        </div>
    </ng-template>

    <!-- Table Header -->
    <ng-template #header>
        <tr>
            <th style="width: 3rem">
                <p-tableHeaderCheckbox />
            </th>
            <th style="min-width: 16rem">Code</th>
            <th pSortableColumn="name" style="min-width: 16rem">
                Name
                <p-sortIcon field="name" />
            </th>
            <th>Image</th>
            <th pSortableColumn="price" style="min-width: 8rem">
                Price
                <p-sortIcon field="price" />
            </th>
            <th pSortableColumn="category" style="min-width: 10rem">
                Category
                <p-sortIcon field="category" />
            </th>
            <th pSortableColumn="rating" style="min-width: 12rem">
                Reviews
                <p-sortIcon field="rating" />
            </th>
            <th pSortableColumn="inventoryStatus" style="min-width: 12rem">
                Status
                <p-sortIcon field="inventoryStatus" />
            </th>
            <th style="min-width: 12rem"></th>
        </tr>
    </ng-template>

    <!-- Table Body -->
    <ng-template #body let-product>
        <tr>
            <td style="width: 3rem">
                <p-tableCheckbox [value]="product" />
            </td>

            <td style="min-width: 12rem">{{ product.code }}</td>

            <td style="min-width: 16rem">{{ product.name }}</td>

            <td>
                <img
                    [src]="'https://primefaces.org/cdn/primeng/images/demo/product/' + product.image"
                    [alt]="product.name"
                    style="width: 64px"
                    class="rounded"
                />
            </td>

            <td>{{ product.price | currency: 'USD' }}</td>

            <td>{{ product.category }}</td>

            <td>
                <p-rating [(ngModel)]="product.rating" [readonly]="true"></p-rating>
            </td>

            <td>
                <p-tag
                    [value]="product.inventoryStatus"
                    [severity]="getSeverity(product.inventoryStatus)"
                />
            </td>

            <td>
                <p-button
                    icon="pi pi-pencil"
                    class="mr-2"
                    [rounded]="true"
                    [outlined]="true"
                    (click)="editProduct(product)"
                />
                <p-button
                    icon="pi pi-trash"
                    severity="danger"
                    [rounded]="true"
                    [outlined]="true"
                    (click)="deleteProduct(product)"
                />
            </td>
        </tr>
    </ng-template>
</p-table>

<!-- ============================= -->
<!--  Dialog: Product Details      -->
<!-- ============================= -->
<csm-dialog
    [(visible)]="productDialog"
    title="Product Details"
    [width]="'450px'"
    [disableSave]="!product.name?.trim()"
    (save)="saveProduct()"
    (cancel)="hideDialog()">

    <product-form
        [product]="product"
        [submitted]="submitted"
        [statuses]="statuses"
        [showActions]="false"
    ></product-form>

</csm-dialog>

<!-- ============================= -->
<!--  Global Confirm Dialog        -->
<!-- ============================= -->
<p-confirmDialog [style]="{ width: '450px' }"></p-confirmDialog>
