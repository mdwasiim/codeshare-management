<div class="flex flex-col gap-6">

    <!-- Image -->
    <img *ngIf="product.image"
         [src]="'https://primefaces.org/cdn/primeng/images/demo/product/' + product.image"
         [alt]="product.image"
         class="block m-auto pb-4"
    />

    <!-- Name -->
    <div>
        <label class="block font-bold mb-3">Name</label>
        <input
            type="text"
            pInputText
            [(ngModel)]="product.name"
            required
            autofocus
            class="w-full"
        />
        <small *ngIf="submitted && !product.name" class="text-red-500">
            Name is required.
        </small>
    </div>

    <!-- Description -->
    <div>
        <label class="block font-bold mb-3">Description</label>
        <textarea
            pTextarea
            [(ngModel)]="product.description"
            rows="3"
            class="w-full"
        ></textarea>
    </div>

    <!-- Inventory Status -->
    <div>
        <label class="block font-bold mb-3">Inventory Status</label>

        <!-- Use dropdown instead of select -->
        <p-select
            [(ngModel)]="product.inventoryStatus"
            [options]="statuses"
            optionLabel="label"
            optionValue="label"
            placeholder="Select a Status"
            class="w-full"
        ></p-select>
    </div>

    <!-- Category -->
    <div>
        <span class="block font-bold mb-4">Category</span>

        <div class="grid grid-cols-12 gap-4">
            <div class="flex items-center gap-2 col-span-6">
                <p-radiobutton value="Accessories" [(ngModel)]="product.category"></p-radiobutton>
                <label>Accessories</label>
            </div>

            <div class="flex items-center gap-2 col-span-6">
                <p-radiobutton value="Clothing" [(ngModel)]="product.category"></p-radiobutton>
                <label>Clothing</label>
            </div>

            <div class="flex items-center gap-2 col-span-6">
                <p-radiobutton value="Electronics" [(ngModel)]="product.category"></p-radiobutton>
                <label>Electronics</label>
            </div>

            <div class="flex items-center gap-2 col-span-6">
                <p-radiobutton value="Fitness" [(ngModel)]="product.category"></p-radiobutton>
                <label>Fitness</label>
            </div>
        </div>
    </div>

    <!-- Price & Quantity -->
    <div class="grid grid-cols-12 gap-4">
        <div class="col-span-6">
            <label class="block font-bold mb-3">Price</label>
            <p-inputnumber
                [(ngModel)]="product.price"
                mode="currency"
                currency="USD"
                locale="en-US"
                class="w-full"
            ></p-inputnumber>
        </div>

        <div class="col-span-6">
            <label class="block font-bold mb-3">Quantity</label>
            <p-inputnumber
                [(ngModel)]="product.quantity"
                class="w-full"
            ></p-inputnumber>
        </div>
    </div>

    <!-- Footer -->
    <div class="flex justify-end gap-2">
        <p-button label="Cancel" icon="pi pi-times" text (click)="cancel.emit()"></p-button>
        <p-button label="Save" icon="pi pi-check" (click)="save.emit()"></p-button>
    </div>

</div>
