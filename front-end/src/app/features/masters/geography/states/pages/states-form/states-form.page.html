<form [formGroup]="form" class="p-fluid w-full block app-form">
    <app-form-section title="State Details">
        <div class="grid">
            <div class="field col-12 md:col-6">
                <label for="code" class="required">Code</label>
                <input id="code" pInputText formControlName="code" class="w-full" />
                <small class="p-error" *ngIf="form.controls['code'].hasError('required') && form.controls['code'].touched">Code is required.</small>
            </div>

            <div class="field col-12 md:col-6">
                <label for="name" class="required">Name</label>
                <input id="name" pInputText formControlName="name" class="w-full" />
                <small class="p-error" *ngIf="form.controls['name'].hasError('required') && form.controls['name'].touched">Name is required.</small>
            </div>

            <div class="field col-12 md:col-6">
                <label for="recordStatus">Record Status</label>
                <p-select inputId="recordStatus" appendTo="body" [options]="recordStatusOptions" formControlName="recordStatus" styleClass="w-full"></p-select>
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="effectiveFrom">Effective From</label>
                <input id="effectiveFrom" pInputText type="date" formControlName="effectiveFrom" class="w-full" />
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="effectiveTo">Effective To</label>
                <input id="effectiveTo" pInputText type="date" formControlName="effectiveTo" class="w-full" />
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="active">Active</label>
                <div class="flex align-items-center gap-2"><p-checkbox inputId="active" formControlName="active" binary="true"></p-checkbox><label for="active" class="mb-0">Enabled</label></div>
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="countryId">Country</label>
                <p-select inputId="countryId" appendTo="body" [options]="lookupOptions['countryId'] || []" optionLabel="label" optionValue="value" [filter]="true" filterBy="label" [showClear]="true" formControlName="countryId" styleClass="w-full"></p-select>
                
            </div>
        </div>
    </app-form-section>
</form>
