<form [formGroup]="form" class="p-fluid w-full block app-form">
    <app-form-section title="Aircraft Types Details">
        <div class="grid">
            <div class="field col-12 md:col-6">
                <label for="manufacturer">Manufacturer</label>
                <input id="manufacturer" pInputText formControlName="manufacturer" class="w-full" />
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="modelCode" class="required">Model Code</label>
                <input id="modelCode" pInputText formControlName="modelCode" class="w-full" />
                <small class="p-error" *ngIf="form.controls['modelCode'].hasError('required') && form.controls['modelCode'].touched">Model Code is required.</small>
            </div>

            <div class="field col-12 md:col-6">
                <label for="icaoCode">ICAO</label>
                <input id="icaoCode" pInputText formControlName="icaoCode" class="w-full" />
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="iataCode">IATA</label>
                <input id="iataCode" pInputText formControlName="iataCode" class="w-full" />
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="engineType">Engine Type</label>
                <input id="engineType" pInputText formControlName="engineType" class="w-full" />
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="typicalSeatCapacity">Typical Seats</label>
                <p-inputnumber inputId="typicalSeatCapacity" formControlName="typicalSeatCapacity" styleClass="w-full"></p-inputnumber>
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="maxRangeKm">Max Range KM</label>
                <p-inputnumber inputId="maxRangeKm" formControlName="maxRangeKm" styleClass="w-full"></p-inputnumber>
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="recordStatus">Record Status</label>
                <p-select inputId="recordStatus" appendTo="body" [options]="recordStatusOptions" formControlName="recordStatus" styleClass="w-full"></p-select>
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="effectiveFrom">Effective From</label>
                <input id="effectiveFrom" pInputText type="date" formControlName="effectiveFrom" class="w-full" />
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="effectiveTo">Effective To</label>
                <input id="effectiveTo" pInputText type="date" formControlName="effectiveTo" class="w-full" />
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="active">Active</label>
                <div class="flex align-items-center gap-2"><p-checkbox inputId="active" formControlName="active" binary="true"></p-checkbox><label for="active" class="mb-0">Enabled</label></div>
                
            </div>
        </div>
    </app-form-section>
</form>
