<form [formGroup]="form" class="p-fluid w-full block app-form">
    <app-form-section title="Aircraft Configuration Details">
        <div class="grid">
            <div class="field col-12 md:col-6">
                <label for="configurationCode" class="required">Configuration Code</label>
                <input id="configurationCode" pInputText formControlName="configurationCode" class="w-full" />
                <small class="p-error" *ngIf="form.controls['configurationCode'].hasError('required') && form.controls['configurationCode'].touched">Configuration Code is required.</small>
            </div>

            <div class="field col-12 md:col-6">
                <label for="configurationName">Configuration Name</label>
                <input id="configurationName" pInputText formControlName="configurationName" class="w-full" />
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="aircraftTypeId">Aircraft Type ID</label>
                <input id="aircraftTypeId" pInputText formControlName="aircraftTypeId" class="w-full" />
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="totalSeats">Total Seats</label>
                <p-inputnumber inputId="totalSeats" formControlName="totalSeats" styleClass="w-full"></p-inputnumber>
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="recordStatus">Record Status</label>
                <p-select inputId="recordStatus" appendTo="body" [options]="recordStatusOptions" formControlName="recordStatus" styleClass="w-full"></p-select>
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="effectiveFrom">Effective From</label>
                <input id="effectiveFrom" pInputText type="date" formControlName="effectiveFrom" class="w-full" />
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="effectiveTo">Effective To</label>
                <input id="effectiveTo" pInputText type="date" formControlName="effectiveTo" class="w-full" />
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="active">Active</label>
                <div class="flex align-items-center gap-2"><p-checkbox inputId="active" formControlName="active" binary="true"></p-checkbox><label for="active" class="mb-0">Enabled</label></div>
                
            </div>
        </div>
    </app-form-section>
</form>
