<form [formGroup]="form" class="p-fluid w-full block app-form">
    <app-form-section title="Cabin Layouts Details">
        <div class="grid">
            <div class="field col-12 md:col-6">
                <label for="layoutCode" class="required">Layout Code</label>
                <input id="layoutCode" pInputText formControlName="layoutCode" class="w-full" />
                <small class="p-error" *ngIf="form.controls['layoutCode'].hasError('required') && form.controls['layoutCode'].touched">Layout Code is required.</small>
            </div>

            <div class="field col-12 md:col-6">
                <label for="layoutName">Layout Name</label>
                <input id="layoutName" pInputText formControlName="layoutName" class="w-full" />
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="cabinClass">Cabin Class</label>
                <input id="cabinClass" pInputText formControlName="cabinClass" class="w-full" />
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="seatCount">Seat Count</label>
                <p-inputnumber inputId="seatCount" formControlName="seatCount" styleClass="w-full"></p-inputnumber>
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="recordStatus">Record Status</label>
                <p-select inputId="recordStatus" appendTo="body" [options]="recordStatusOptions" formControlName="recordStatus" styleClass="w-full"></p-select>
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="effectiveFrom">Effective From</label>
                <input id="effectiveFrom" pInputText type="date" formControlName="effectiveFrom" class="w-full" />
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="effectiveTo">Effective To</label>
                <input id="effectiveTo" pInputText type="date" formControlName="effectiveTo" class="w-full" />
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="active">Active</label>
                <div class="flex align-items-center gap-2"><p-checkbox inputId="active" formControlName="active" binary="true"></p-checkbox><label for="active" class="mb-0">Enabled</label></div>
                
            </div>
        </div>
    </app-form-section>
</form>
