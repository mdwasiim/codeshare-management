<form [formGroup]="form" class="p-fluid w-full block app-form">
    <app-form-section title="Alliance Members Details">
        <div class="grid">
            <div class="field col-12 md:col-6">
                <label for="allianceId" class="required">Alliance ID</label>
                <input id="allianceId" pInputText formControlName="allianceId" class="w-full" />
                <small class="p-error" *ngIf="form.controls['allianceId'].hasError('required') && form.controls['allianceId'].touched">Alliance ID is required.</small>
            </div>

            <div class="field col-12 md:col-6">
                <label for="airlineId" class="required">Airline ID</label>
                <input id="airlineId" pInputText formControlName="airlineId" class="w-full" />
                <small class="p-error" *ngIf="form.controls['airlineId'].hasError('required') && form.controls['airlineId'].touched">Airline ID is required.</small>
            </div>

            <div class="field col-12 md:col-6">
                <label for="memberType">Member Type</label>
                <input id="memberType" pInputText formControlName="memberType" class="w-full" />
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="recordStatus">Record Status</label>
                <p-select inputId="recordStatus" appendTo="body" [options]="recordStatusOptions" formControlName="recordStatus" styleClass="w-full"></p-select>
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="effectiveFrom">Effective From</label>
                <input id="effectiveFrom" pInputText type="date" formControlName="effectiveFrom" class="w-full" />
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="effectiveTo">Effective To</label>
                <input id="effectiveTo" pInputText type="date" formControlName="effectiveTo" class="w-full" />
                
            </div>

            <div class="field col-12 md:col-6">
                <label for="active">Active</label>
                <div class="flex align-items-center gap-2"><p-checkbox inputId="active" formControlName="active" binary="true"></p-checkbox><label for="active" class="mb-0">Enabled</label></div>
                
            </div>
        </div>
    </app-form-section>
</form>
