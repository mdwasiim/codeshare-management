<form [formGroup]="form" class="p-fluid w-full block app-form">
    <div class="w-full">
        <!-- USER INFORMATION -->
        <app-form-section title="User Information">
            <div class="grid">
                <div class="field col-12 md:col-6">
                    <label for="username" class="required">Username</label>

                    <input id="username" pInputText formControlName="username" class="w-full" aria-required="true" />
                    <small class="p-error" *ngIf="form.controls['username'].hasError('required') && form.controls['username'].touched">Username is required.</small>
                </div>

                <div class="field col-12 md:col-6">
                    <label for="email" class="required">Email Address</label>

                    <input id="email" pInputText formControlName="email" class="w-full" aria-required="true" />
                    <small class="p-error" *ngIf="form.controls['email'].hasError('required') && form.controls['email'].touched">Email address is required.</small>
                    <small class="p-error" *ngIf="form.controls['email'].hasError('email') && form.controls['email'].touched">Enter a valid email address.</small>
                </div>

                <div class="field col-12 md:col-6">
                    <label for="firstName">First Name</label>

                    <input id="firstName" pInputText formControlName="firstName" class="w-full" />
                </div>

                <div class="field col-12 md:col-6">
                    <label for="lastName">Last Name</label>

                    <input id="lastName" pInputText formControlName="lastName" class="w-full" />
                </div>

                <div class="field col-12 md:col-6">
                    <label for="password">Password</label>

                    <p-password inputId="password" formControlName="password" [toggleMask]="true" [feedback]="false" styleClass="w-full"> </p-password>
                    <small class="p-error" *ngIf="form.controls['password'].hasError('minlength') && form.controls['password'].touched">Password must be at least 8 characters.</small>
                </div>

                <div class="field col-12 md:col-6">
                    <label for="tenant" class="required">Tenant</label>

                    <p-select inputId="tenant" appendTo="body" [options]="tenants" optionLabel="name" optionValue="id" formControlName="tenantId" placeholder="Select Tenant" styleClass="w-full" aria-required="true"> </p-select>
                    <small class="p-error" *ngIf="form.controls['tenantId'].hasError('required') && form.controls['tenantId'].touched">Tenant is required.</small>
                </div>
            </div>
        </app-form-section>

        <!-- ACCOUNT SETTINGS -->
        <app-form-section title="Account Settings">
            <div class="grid">
                <div class="col-12 md:col-6">
                    <div class="flex align-items-center gap-2">
                        <p-checkbox inputId="enabled" formControlName="enabled" binary="true"> </p-checkbox>

                        <label for="enabled" class="mb-0"> Enabled </label>
                    </div>
                </div>

                <div class="col-12 md:col-6">
                    <div class="flex align-items-center gap-2">
                        <p-checkbox inputId="accountNonLocked" formControlName="accountNonLocked" binary="true"> </p-checkbox>

                        <label for="accountNonLocked" class="mb-0"> Account Unlocked </label>
                    </div>
                </div>

                <div class="col-12 md:col-6">
                    <div class="flex align-items-center gap-2">
                        <p-checkbox inputId="accountNonExpired" formControlName="accountNonExpired" binary="true"> </p-checkbox>

                        <label for="accountNonExpired" class="mb-0"> Account Active </label>
                    </div>
                </div>

                <div class="col-12 md:col-6">
                    <div class="flex align-items-center gap-2">
                        <p-checkbox inputId="credentialsNonExpired" formControlName="credentialsNonExpired" binary="true"> </p-checkbox>

                        <label for="credentialsNonExpired" class="mb-0"> Credentials Valid </label>
                    </div>
                </div>
            </div>
        </app-form-section>

        <!-- AUTHENTICATION & SYSTEM -->
        <app-form-section title="Authentication & System">
            <div class="grid">
                <div class="field col-12 md:col-6">
                    <label for="authSource"> Authentication Source </label>

                    <p-select
                        inputId="authSource"
                        appendTo="body"
                        [options]="[
                            { label: 'Internal', value: 'INTERNAL' },
                            { label: 'LDAP', value: 'LDAP' },
                            { label: 'OAuth', value: 'OAUTH' }
                        ]"
                        formControlName="authSource"
                        styleClass="w-full"
                    >
                    </p-select>
                </div>

                <div class="field col-12 md:col-6">
                    <label for="recordStatus"> Record Status </label>

                    <p-select
                        inputId="recordStatus"
                        appendTo="body"
                        [options]="[
                            { label: 'Active', value: 'ACTIVE' },
                            { label: 'Inactive', value: 'INACTIVE' }
                        ]"
                        formControlName="recordStatus"
                        styleClass="w-full"
                    >
                    </p-select>
                </div>

                <div class="field col-12 md:col-6">
                    <label for="externalId"> External ID </label>

                    <input id="externalId" pInputText formControlName="externalId" class="w-full" />
                </div>

                <div class="field col-12 md:col-6">
                    <label for="lastLoginProvider"> Last Login Provider </label>

                    <input id="lastLoginProvider" pInputText formControlName="lastLoginProvider" class="w-full" />
                </div>
            </div>
        </app-form-section>
    </div>
</form>
