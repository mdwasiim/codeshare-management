<form [formGroup]="form" class="access-form">
    <app-form-section title="Profile Details">
        <div class="form-grid form-grid--2">
            <div class="field">
                <label for="partnerId">Codeshare Partner <span class="required">*</span></label>
                <p-select
                    inputId="partnerId"
                    appendTo="body"
                    [options]="partnerOptions"
                    optionLabel="label"
                    optionValue="value"
                    [filter]="true"
                    filterBy="label"
                    [showClear]="true"
                    formControlName="partnerId"
                    placeholder="Select partner"
                ></p-select>
                <small class="p-error" *ngIf="form.get('partnerId')?.touched && form.get('partnerId')?.invalid">Partner is required.</small>
            </div>

            <div class="field">
                <label for="profileCode">Profile Code <span class="required">*</span></label>
                <input id="profileCode" pInputText formControlName="profileCode" maxlength="100" />
                <small class="p-error" *ngIf="form.get('profileCode')?.touched && form.get('profileCode')?.invalid">Profile code is required.</small>
            </div>

            <div class="field">
                <label for="profileName">Profile Name <span class="required">*</span></label>
                <input id="profileName" pInputText formControlName="profileName" maxlength="200" />
                <small class="p-error" *ngIf="form.get('profileName')?.touched && form.get('profileName')?.invalid">Profile name is required.</small>
            </div>

            <div class="field">
                <label for="protocol">Protocol</label>
                <p-select inputId="protocol" appendTo="body" [options]="protocolOptions" optionLabel="label" optionValue="value" formControlName="protocol" placeholder="Select protocol"></p-select>
            </div>

            <div class="field">
                <label for="transportType">Transport Type</label>
                <p-select inputId="transportType" appendTo="body" [options]="transportOptions" optionLabel="label" optionValue="value" formControlName="transportType" placeholder="Select transport"></p-select>
            </div>

            <div class="field">
                <label for="messageFormat">Message Format</label>
                <p-select inputId="messageFormat" appendTo="body" [options]="messageFormatOptions" optionLabel="label" optionValue="value" formControlName="messageFormat" placeholder="Select format"></p-select>
            </div>

            <div class="field">
                <label for="authenticationType">Authentication</label>
                <p-select inputId="authenticationType" appendTo="body" [options]="authenticationTypeOptions" optionLabel="label" optionValue="value" formControlName="authenticationType" placeholder="Select method"></p-select>
            </div>

            <div class="field field--full">
                <label for="endpointUrl">Endpoint URL</label>
                <input id="endpointUrl" pInputText formControlName="endpointUrl" maxlength="500" />
            </div>

            <div class="field">
                <label for="username">Username</label>
                <input id="username" pInputText formControlName="username" maxlength="200" />
            </div>

            <div class="field">
                <label for="credentialAlias">Credential Alias</label>
                <input id="credentialAlias" pInputText formControlName="credentialAlias" maxlength="200" />
            </div>

            <div class="field">
                <label for="connectionTimeout">Connection Timeout (ms)</label>
                <p-inputnumber inputId="connectionTimeout" formControlName="connectionTimeout" [useGrouping]="false"></p-inputnumber>
            </div>

            <div class="field">
                <label for="readTimeout">Read Timeout (ms)</label>
                <p-inputnumber inputId="readTimeout" formControlName="readTimeout" [useGrouping]="false"></p-inputnumber>
            </div>

            <div class="field">
                <label for="retryCount">Retry Count</label>
                <p-inputnumber inputId="retryCount" formControlName="retryCount" [useGrouping]="false"></p-inputnumber>
            </div>

            <div class="field">
                <label for="displayOrder">Display Order</label>
                <p-inputnumber inputId="displayOrder" formControlName="displayOrder" [useGrouping]="false"></p-inputnumber>
            </div>

            <div class="field">
                <label for="recordStatus">Record Status</label>
                <p-select inputId="recordStatus" appendTo="body" [options]="recordStatusOptions" optionLabel="label" optionValue="value" formControlName="recordStatus"></p-select>
            </div>

            <div class="field">
                <label for="effectiveFrom">Effective From</label>
                <input id="effectiveFrom" pInputText type="date" formControlName="effectiveFrom" />
            </div>

            <div class="field">
                <label for="effectiveTo">Effective To</label>
                <input id="effectiveTo" pInputText type="date" formControlName="effectiveTo" />
            </div>
        </div>
    </app-form-section>

    <app-form-section title="Transport Flags">
        <div class="form-grid form-grid--2">
            <div class="field">
                <div class="flex items-center gap-2">
                    <p-checkbox inputId="compressionEnabled" formControlName="compressionEnabled" binary="true"></p-checkbox>
                    <label for="compressionEnabled" class="mb-0">Compression enabled</label>
                </div>
            </div>

            <div class="field">
                <div class="flex items-center gap-2">
                    <p-checkbox inputId="encryptionEnabled" formControlName="encryptionEnabled" binary="true"></p-checkbox>
                    <label for="encryptionEnabled" class="mb-0">Encryption enabled</label>
                </div>
            </div>

            <div class="field">
                <div class="flex items-center gap-2">
                    <p-checkbox inputId="active" formControlName="active" binary="true"></p-checkbox>
                    <label for="active" class="mb-0">Active</label>
                </div>
            </div>
        </div>
    </app-form-section>

    <app-form-section title="Notes">
        <div class="form-grid">
            <div class="field field--full">
                <label for="description">Description</label>
                <textarea id="description" pTextarea formControlName="description" rows="3" maxlength="500"></textarea>
            </div>

            <div class="field field--full">
                <label for="remarks">Remarks</label>
                <textarea id="remarks" pTextarea formControlName="remarks" rows="4" maxlength="1000"></textarea>
            </div>
        </div>
    </app-form-section>
</form>
