<form [formGroup]="form" class="p-fluid w-full block app-form">
    <app-form-section title="Profile Details">
        <div class="grid">
            <div class="field col-12 md:col-6">
                <label for="partnerId" class="required">Codeshare Partner</label>
                <p-select
                    inputId="partnerId"
                    appendTo="body"
                    [options]="partnerOptions"
                    optionLabel="label"
                    optionValue="value"
                    [filter]="true"
                    filterBy="label"
                    [showClear]="true"
                    formControlName="partnerId"
                    placeholder="Select partner"
                    styleClass="w-full"
                ></p-select>
                <small class="p-error" *ngIf="form.controls['partnerId'].hasError('required') && form.controls['partnerId'].touched">Partner is required.</small>
            </div>

            <div class="field col-12 md:col-6">
                <label for="profileCode" class="required">Profile Code</label>
                <input id="profileCode" pInputText formControlName="profileCode" class="w-full" maxlength="100" />
                <small class="p-error" *ngIf="form.controls['profileCode'].hasError('required') && form.controls['profileCode'].touched">Profile code is required.</small>
            </div>

            <div class="field col-12 md:col-6">
                <label for="profileName" class="required">Profile Name</label>
                <input id="profileName" pInputText formControlName="profileName" class="w-full" maxlength="200" />
                <small class="p-error" *ngIf="form.controls['profileName'].hasError('required') && form.controls['profileName'].touched">Profile name is required.</small>
            </div>

            <div class="field col-12 md:col-6">
                <label for="partnerType">Partner Type</label>
                <p-select
                    inputId="partnerType"
                    appendTo="body"
                    [options]="partnerTypeOptions"
                    optionLabel="label"
                    optionValue="value"
                    [showClear]="true"
                    formControlName="partnerType"
                    placeholder="Select type"
                    styleClass="w-full"
                ></p-select>
            </div>

            <div class="field col-12 md:col-6">
                <label for="agreementCategory">Agreement Category</label>
                <p-select
                    inputId="agreementCategory"
                    appendTo="body"
                    [options]="agreementCategoryOptions"
                    optionLabel="label"
                    optionValue="value"
                    [showClear]="true"
                    formControlName="agreementCategory"
                    placeholder="Select category"
                    styleClass="w-full"
                ></p-select>
            </div>

            <div class="field col-12 md:col-6">
                <label for="inventorySharingType">Inventory Sharing</label>
                <p-select
                    inputId="inventorySharingType"
                    appendTo="body"
                    [options]="inventorySharingOptions"
                    optionLabel="label"
                    optionValue="value"
                    [showClear]="true"
                    formControlName="inventorySharingType"
                    placeholder="Select model"
                    styleClass="w-full"
                ></p-select>
            </div>

            <div class="field col-12 md:col-6">
                <label for="priority">Priority</label>
                <p-inputnumber inputId="priority" formControlName="priority" [useGrouping]="false"></p-inputnumber>
            </div>

            <div class="field col-12 md:col-6">
                <label for="displayOrder">Display Order</label>
                <p-inputnumber inputId="displayOrder" formControlName="displayOrder" [useGrouping]="false"></p-inputnumber>
            </div>

            <div class="field col-12 md:col-6">
                <label for="recordStatus">Record Status</label>
                <p-select
                    inputId="recordStatus"
                    appendTo="body"
                    [options]="recordStatusOptions"
                    optionLabel="label"
                    optionValue="value"
                    formControlName="recordStatus"
                    styleClass="w-full"
                ></p-select>
            </div>

            <div class="field col-12 md:col-6">
                <label for="effectiveFrom">Effective From</label>
                <input id="effectiveFrom" pInputText type="date" formControlName="effectiveFrom" class="w-full" />
            </div>

            <div class="field col-12 md:col-6">
                <label for="effectiveTo">Effective To</label>
                <input id="effectiveTo" pInputText type="date" formControlName="effectiveTo" class="w-full" />
            </div>
        </div>
    </app-form-section>

    <app-form-section title="Operational Rules">
        <div class="grid">
            <div class="field col-12 md:col-6">
                <label for="autoAcceptScheduleChanges">Schedule Changes</label>
                <div class="flex align-items-center gap-2 h-full">
                    <p-checkbox inputId="autoAcceptScheduleChanges" formControlName="autoAcceptScheduleChanges" binary="true"></p-checkbox>
                    <label for="autoAcceptScheduleChanges" class="mb-0">Auto accept schedule changes</label>
                </div>
            </div>

            <div class="field col-12 md:col-6">
                <label for="prorationApplicable">Proration</label>
                <div class="flex align-items-center gap-2 h-full">
                    <p-checkbox inputId="prorationApplicable" formControlName="prorationApplicable" binary="true"></p-checkbox>
                    <label for="prorationApplicable" class="mb-0">Proration applicable</label>
                </div>
            </div>

            <div class="field col-12 md:col-6">
                <label for="eTicketAllowed">E-Ticket</label>
                <div class="flex align-items-center gap-2 h-full">
                    <p-checkbox inputId="eTicketAllowed" formControlName="eTicketAllowed" binary="true"></p-checkbox>
                    <label for="eTicketAllowed" class="mb-0">E-ticket allowed</label>
                </div>
            </div>

            <div class="field col-12 md:col-6">
                <label for="active">Profile State</label>
                <div class="flex align-items-center gap-2 h-full">
                    <p-checkbox inputId="active" formControlName="active" binary="true"></p-checkbox>
                    <label for="active" class="mb-0">Active</label>
                </div>
            </div>
        </div>
    </app-form-section>

    <app-form-section title="Notes">
        <div class="grid">
            <div class="field col-12">
                <label for="description">Description</label>
                <textarea id="description" pTextarea formControlName="description" rows="3" class="w-full" maxlength="500"></textarea>
            </div>

            <div class="field col-12">
                <label for="remarks">Remarks</label>
                <textarea id="remarks" pTextarea formControlName="remarks" rows="4" class="w-full" maxlength="1000"></textarea>
            </div>
        </div>
    </app-form-section>
</form>
