<div class="access-page access-page--list">
<div class="access-page-header">
    <div>
        <span class="access-eyebrow">Authorization</span>
        <h1>Groups</h1>
        <p>Manage access groups used for user, role, and menu assignment.</p>
    </div>
</div>

<csm-crud-toolbar
    [actions]="[
        'create',
        'delete',
        'search',
        'export'
    ]"
    [resource]="resourceName"
    [hasSelection]="
        selectedGroups.length > 0
    "
    (create)="openCreate()"
    (delete)="deleteSelectedGroups()"
    (export)="exportCSV()"
    (search)="onSearch($event)"
>
</csm-crud-toolbar>

<p-table
    #dt
    [value]="data"
    [loading]="loading"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[10,20,50]"
    [(selection)]="selectedGroups"
    dataKey="id"
    [rowHover]="true"
    styleClass="access-table p-datatable-sm"
    [tableStyle]="{ 'min-width': '60rem' }"
    [globalFilterFields]="['code','name','description']"
>
    <ng-template pTemplate="caption">
        <div class="access-table-caption">
            <div>
                <h2>Manage Groups</h2>
                <p>{{ data.length || 0 }} groups loaded</p>
            </div>
            <span class="access-count">{{ selectedGroups.length || 0 }} selected</span>
        </div>
    </ng-template>

    <!-- Header -->
    <ng-template pTemplate="header">
        <tr>
            <th style="width: 3rem">
                <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
            </th>
            <th>Code</th>
            <th>Name</th>
            <th>Description</th>
            <th>Tenant</th>
            <th class="access-actions-col">Actions</th>
        </tr>
    </ng-template>

    <!-- Body -->
    <ng-template pTemplate="body" let-group>
        <tr>
            <td>
                <p-tableCheckbox [value]="group"></p-tableCheckbox>
            </td>

            <td>{{ group.code }}</td>
            <td>{{ group.name }}</td>
            <td>{{ group.description }}</td>

            <td>
                <p-tag [value]="group.tenantId" severity="info"></p-tag>
            </td>

            <td class="access-row-actions">
                <div>
                    <ng-container *csmHasPermission="'group:update'">
                        <p-button icon="pi pi-pencil" size="small" text pTooltip="Edit" tooltipPosition="top" (click)="openEdit(group)"> </p-button>
                    </ng-container>

                    <ng-container *csmHasPermission="'group:delete'">
                        <p-button icon="pi pi-trash" size="small" text severity="danger" pTooltip="Delete" tooltipPosition="top" (click)="deleteGroup(group)"> </p-button>
                    </ng-container>
                </div>
            </td>
        </tr>
    </ng-template>

    <!-- Empty -->
    <ng-template pTemplate="emptymessage">
        <tr>
            <td colspan="6" class="text-center py-6 text-gray-500">
                <i class="pi pi-users text-2xl mb-2"></i>
                <div>No groups found</div>
            </td>
        </tr>
    </ng-template>
</p-table>

<csm-dialog [(visible)]="dialogVisible" [title]="selectedId ? 'Edit Group' : 'Create Group'" [disableSave]="!!formRef?.form?.invalid || !!formRef?.loading" (save)="formRef.submit()">
    <group-form #formRef [id]="selectedId" (saved)="onSaved()"> </group-form>
</csm-dialog>
</div>
