<div class="access-page access-page--list">
<div class="access-page-header">
    <div>
        <span class="access-eyebrow">Identity</span>
        <h1>Tenants</h1>
        <p>Manage tenant records, subscription status, and plan details.</p>
    </div>
</div>

<csm-crud-toolbar [actions]="['create','delete','export','search']" [resource]="resourceName" [hasSelection]="selectedTenants.length > 0" (create)="openCreate()" (delete)="deleteSelectedTenants()" (export)="exportCSV()" (search)="onSearch($event)">
</csm-crud-toolbar>

<p-table
    #dt
    [value]="data"
    [loading]="loading"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[10,20,50]"
    [(selection)]="selectedTenants"
    dataKey="id"
    [rowHover]="true"
    responsiveLayout="scroll"
    styleClass="access-table p-datatable-sm"
    [globalFilterFields]="['name','code','plan','status']"
>
    <ng-template pTemplate="caption">
        <div class="access-table-caption">
            <div>
                <h2>Manage Tenants</h2>
                <p>{{ data.length || 0 }} tenants loaded</p>
            </div>
            <span class="access-count">{{ selectedTenants.length || 0 }} selected</span>
        </div>
    </ng-template>

    <!-- Header -->
    <ng-template pTemplate="header">
        <tr>
            <th style="width: 3rem">
                <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
            </th>

            <th pSortableColumn="name">
                Name
                <p-sortIcon field="name"></p-sortIcon>
            </th>

            <th pSortableColumn="code">
                Code
                <p-sortIcon field="code"></p-sortIcon>
            </th>

            <th>Status</th>
            <th>Plan</th>

            <th class="access-actions-col">Actions</th>
        </tr>
    </ng-template>

    <!-- Body -->
    <ng-template pTemplate="body" let-tenant>
        <tr>
            <td>
                <p-tableCheckbox [value]="tenant"></p-tableCheckbox>
            </td>

            <td>{{ tenant.name }}</td>
            <td>{{ tenant.code }}</td>

            <td>
                <p-tag [value]="tenant.status" [severity]="getStatusSeverity(tenant.status)"> </p-tag>
            </td>

            <td>{{ tenant.plan || '-' }}</td>

            <td class="access-row-actions">
                <div>
                    <ng-container *csmHasPermission="'tenant:update'">
                        <p-button icon="pi pi-pencil" size="small" text pTooltip="Edit" tooltipPosition="top" (click)="openEdit(tenant)"> </p-button>
                    </ng-container>

                    <ng-container *csmHasPermission="'tenant:delete'">
                        <p-button icon="pi pi-trash" size="small" text severity="danger" pTooltip="Delete" tooltipPosition="top" (click)="deleteTenant(tenant)"> </p-button>
                    </ng-container>
                </div>
            </td>
        </tr>
    </ng-template>
</p-table>

<csm-dialog [(visible)]="dialogVisible" [title]="selectedId ? 'Edit Tenant' : 'Create Tenant'" [disableSave]="!!formRef?.form?.invalid || !!formRef?.loading" (save)="formRef.submit()">
    <tenant-form #formRef [id]="selectedId" (saved)="onSaved()"> </tenant-form>
</csm-dialog>
</div>
