<csm-assignment-layout leftTitle="Groups" rightTitle="Menus">
    <div left-panel>
        <p-table [value]="groups" [loading]="loading" selectionMode="single" [(selection)]="selectedGroup" dataKey="id" responsiveLayout="scroll" (onRowSelect)="onGroupSelect($any($event.data))">
            <ng-template pTemplate="header">
                <tr>
                    <th>Group Name</th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-group>
                <tr [pSelectableRow]="group">
                    <td>{{ group.name }}</td>
                </tr>
            </ng-template>
        </p-table>
    </div>

    <div right-panel>
        <div class="mb-4">
            <csm-crud-toolbar
                [actions]="[
                    'refresh',
                    'reset',
                    'save'
                ]"
                [loading]="saving"
                (refresh)="loadData()"
                (reset)="reset()"
                (save)="save()"
            >
            </csm-crud-toolbar>
        </div>

        <div *ngIf="!selectedGroup" class="flex align-items-center justify-content-center p-6 text-500">Select a group to manage menus</div>

        <div *ngIf="selectedGroup" class="assignment-selector-list">
            <p-tree [value]="menuTree" selectionMode="checkbox" [(selection)]="selectedMenus" class="w-full"></p-tree>
        </div>
    </div>
</csm-assignment-layout>
