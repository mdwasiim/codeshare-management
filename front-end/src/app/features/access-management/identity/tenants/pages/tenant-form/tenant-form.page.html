<div class="access-page tenant-form-page">
    <div class="access-page-header">
        <div>
            <span class="access-eyebrow">Tenant Management</span>
            <h1>{{ pageTitle }}</h1>
            <p>{{ pageDescription }}</p>
        </div>
        <div class="tenant-form-page__actions">
            <p-button label="Cancel" severity="secondary" [outlined]="true" (click)="cancelEdit()"></p-button>
            <p-button label="Save Tenant" icon="pi pi-save" [loading]="loading" [disabled]="form.invalid || loading" (click)="submit()"></p-button>
        </div>
    </div>

    <form [formGroup]="form" class="p-fluid w-full block app-form tenant-form-page__body">
        <!-- BASIC INFORMATION -->
        <app-form-section title="Basic Information">
            <div class="grid">
                <!-- NAME -->
                <div class="field col-12 md:col-6">
                    <label for="name" class="required">Name</label>

                    <input id="name" pInputText formControlName="name" class="w-full" aria-required="true" />
                    <small class="p-error" *ngIf="form.controls['name'].hasError('required') && form.controls['name'].touched">Name is required.</small>
                </div>

                <!-- CODE -->
                <div class="field col-12 md:col-6">
                    <label for="tenantCode" class="required">Code</label>

                    <input id="tenantCode" pInputText formControlName="tenantCode" class="w-full" aria-required="true" />
                    <small class="p-error" *ngIf="form.controls['tenantCode'].hasError('required') && form.controls['tenantCode'].touched">Code is required.</small>
                </div>

                <!-- DESCRIPTION -->
                <div class="field col-12 md:col-6">
                    <label for="description"> Description </label>

                    <input id="description" pInputText formControlName="description" class="w-full" />
                </div>
                <div class="field col-12 md:col-6">
                    <label for="contactEmail">Contact Email</label>
                    <input id="contactEmail" pInputText formControlName="contactEmail" class="w-full" />
                </div>
                <div class="field col-12 md:col-6">
                    <label for="contactPhone">Contact Phone</label>
                    <input id="contactPhone" pInputText formControlName="contactPhone" class="w-full" />
                </div>
                <div class="field col-12 md:col-6">
                    <label for="region">Region</label>
                    <input id="region" pInputText formControlName="region" class="w-full" />
                </div>
                <div class="field col-12 md:col-6">
                    <label for="logoUrl">Logo URL</label>
                    <input id="logoUrl" pInputText formControlName="logoUrl" class="w-full" />
                </div>
            </div>
        </app-form-section>

        <app-form-section title="Subscription & Lifecycle">
            <div class="grid">
                <div class="field col-12 md:col-6">
                    <label for="status"> Status </label>
                    <p-select inputId="status" appendTo="body" formControlName="status" [options]="statusOptions" placeholder="Select Status" styleClass="w-full"> </p-select>
                </div>
                <div class="field col-12 md:col-6">
                    <label for="plan"> Plan </label>
                    <p-select inputId="plan" appendTo="body" formControlName="plan" [options]="planOptions" placeholder="Select Plan" styleClass="w-full"> </p-select>
                </div>
                <div class="field col-12 md:col-6">
                    <label for="subscriptionStart">Subscription Start</label>
                    <input id="subscriptionStart" pInputText type="date" formControlName="subscriptionStart" class="w-full" />
                </div>
                <div class="field col-12 md:col-6">
                    <label for="subscriptionEnd">Subscription End</label>
                    <input id="subscriptionEnd" pInputText type="date" formControlName="subscriptionEnd" class="w-full" />
                </div>
                <div class="field col-12 md:col-6">
                    <label class="required">Trial Tenant</label>
                    <div class="tenant-form-page__checkbox">
                        <p-checkbox inputId="trial" binary="true" formControlName="trial"></p-checkbox>
                        <label for="trial">Enable trial subscription</label>
                    </div>
                </div>
            </div>
        </app-form-section>

        <app-form-section title="Identity Configuration">
            <div class="grid">
                <div class="field col-12 md:col-6">
                    <label for="authSource">Authentication</label>
                    <p-select inputId="authSource" appendTo="body" formControlName="authSource" [options]="authSourceOptions" placeholder="Select Authentication" styleClass="w-full"> </p-select>
                </div>
            </div>
        </app-form-section>

        <app-form-section title="Identity Provider" *ngIf="isOidcProvider() || isLdapProvider()">
            <div class="grid">
                <div class="field col-12 md:col-6">
                    <label for="oidcIssuerUri">{{ isLdapProvider() ? 'Server URL' : 'Issuer URI' }}</label>
                    <input id="oidcIssuerUri" pInputText formControlName="oidcIssuerUri" class="w-full" />
                </div>
                <div class="field col-12 md:col-6">
                    <label for="oidcScopes">{{ isLdapProvider() ? 'Base DN' : 'Scopes' }}</label>
                    <input id="oidcScopes" pInputText formControlName="oidcScopes" class="w-full" />
                </div>
                <ng-container *ngIf="isOidcProvider()">
                    <div class="field col-12 md:col-6">
                        <label for="oidcAuthorizationUri">Authorization URI</label>
                        <input id="oidcAuthorizationUri" pInputText formControlName="oidcAuthorizationUri" class="w-full" />
                    </div>
                    <div class="field col-12 md:col-6">
                        <label for="oidcTokenUri">Token URI</label>
                        <input id="oidcTokenUri" pInputText formControlName="oidcTokenUri" class="w-full" />
                    </div>
                    <div class="field col-12 md:col-6">
                        <label for="oidcJwkSetUri">JWK Set URI</label>
                        <input id="oidcJwkSetUri" pInputText formControlName="oidcJwkSetUri" class="w-full" />
                    </div>
                    <div class="field col-12 md:col-6">
                        <label for="oidcClientId">Client ID</label>
                        <input id="oidcClientId" pInputText formControlName="oidcClientId" class="w-full" />
                    </div>
                    <div class="field col-12 md:col-6">
                        <label for="oidcClientSecretRef">Client Secret</label>
                        <input id="oidcClientSecretRef" pInputText formControlName="oidcClientSecretRef" class="w-full" />
                    </div>
                    <div class="field col-12 md:col-6">
                        <label for="oidcRedirectUri">Frontend Callback URI</label>
                        <input id="oidcRedirectUri" pInputText formControlName="oidcRedirectUri" class="w-full" />
                    </div>
                </ng-container>
            </div>
        </app-form-section>
    </form>
</div>
