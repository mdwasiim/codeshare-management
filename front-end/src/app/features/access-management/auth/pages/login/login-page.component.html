<div class="min-h-screen flex items-center justify-center
bg-gradient-to-br from-gray-100 via-gray-200 to-gray-300 relative overflow-hidden">

    <!-- 🔥 Background Glow Effects -->
    <div class="absolute w-[500px] h-[500px] bg-green-400/20 rounded-full blur-3xl top-[-100px] left-[-100px]"></div>
    <div class="absolute w-[400px] h-[400px] bg-blue-400/20 rounded-full blur-3xl bottom-[-100px] right-[-100px]"></div>

    <!-- 🔐 Login Card -->
    <div class="relative w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

        <!-- Logo -->
        <div class="flex justify-center mb-4">
            <img src="../../../../../../assets/layout/images/cs-logo.png" class="w-12" />
        </div>

        <!-- Title -->
        <h2 class="text-2xl font-semibold text-center text-gray-800">
            Welcome back
        </h2>
        <p class="text-sm text-gray-500 text-center mb-6">
            Sign in to your account
        </p>

        <!-- Username -->
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">
                Username
            </label>
            <input
                type="text"
                [(ngModel)]="username"
                name="username"
                placeholder="Enter your username"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg
                       focus:ring-2 focus:ring-green-500 focus:outline-none transition"
            />
        </div>

        <!-- Password -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">
                Password
            </label>
            <div class="relative">
                <input
                    [type]="showPassword ? 'text' : 'password'"
                    [(ngModel)]="password"
                    name="password"
                    placeholder="Enter your password"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg
                           focus:ring-2 focus:ring-green-500 focus:outline-none transition"
                />
                <i
                    (click)="showPassword = !showPassword"
                    class="pi pi-eye absolute right-3 top-3 text-gray-400 cursor-pointer">
                </i>
            </div>
        </div>

        <!-- Button -->
        <button
            (click)="login()"
            class="w-full bg-green-600 hover:bg-green-700 text-white
                   py-2.5 rounded-lg font-medium transition shadow-md">
            Sign In
        </button>

    </div>

</div>
