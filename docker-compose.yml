services:

  postgres:
    image: postgres:16
    container_name: codeshare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - codeshare_postgres_data:/var/lib/postgresql/data
    networks:
      - codeshare-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway-service:
    build:
      context: ./back-end
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: services/gateway-service
    container_name: gateway-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SERVER_PORT: 8080

      AUTH_IDENTITY_SERVICE_ISSUER_URI: http://identity-service:8081

      IDENTITY_SERVICE_URL: http://identity-service:8081
      MASTER_DATA_SERVICE_URL: http://master-data-service:8082
      SCHEDULE_INGESTION_SERVICE_URL: http://schedule-ingestion-service:8083
      SCHEDULE_PROCESSING_SERVICE_URL: http://schedule-processing-service:8084

      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}

    depends_on:
      identity-service:
        condition: service_healthy
      master-data-service:
        condition: service_started
      schedule-ingestion-service:
        condition: service_started
      schedule-processing-service:
        condition: service_started

    networks:
      - codeshare-network

  identity-service:
    build:
      context: ./back-end
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: services/identity-service
    container_name: identity-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SERVER_PORT: 8081

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      AUTH_IDENTITY_SERVICE_ISSUER_URI: http://identity-service:8081

      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8081 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

    networks:
      - codeshare-network

  master-data-service:
    build:
      context: ./back-end
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: services/master-data-service
    container_name: master-data-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SERVER_PORT: 8082

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      FRONTEND_URL: ${FRONTEND_URL}

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - codeshare-network

  schedule-ingestion-service:
    build:
      context: ./back-end
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: services/schedule-ingestion-service
    container_name: schedule-ingestion-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SERVER_PORT: 8083

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      FRONTEND_URL: ${FRONTEND_URL}

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - codeshare-network

  schedule-processing-service:
    build:
      context: ./back-end
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: services/schedule-processing-service
    container_name: schedule-processing-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SERVER_PORT: 8084

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      FRONTEND_URL: ${FRONTEND_URL}

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - codeshare-network

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    container_name: codeshare-frontend
    restart: unless-stopped

    depends_on:
      gateway-service:
        condition: service_started

    networks:
      - codeshare-network

  nginx:
    image: nginx:alpine
    container_name: codeshare-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      frontend:
        condition: service_started
      gateway-service:
        condition: service_started

    networks:
      - codeshare-network

volumes:
  codeshare_postgres_data:

networks:
  codeshare-network:
    driver: bridge