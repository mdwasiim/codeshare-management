spring:
  application:
    name: auth-identity-service

  profiles:
    active: dev

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_IDENTITY_SERVICE_ISSUER_URI:http://localhost:8081}

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/csm}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  sql:
    init:
      mode: always

  jpa:
    defer-datasource-initialization: true
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_schema: auth_identity
        hbm2ddl:
          create_namespaces: true

  activemq:
    broker-url: ${ACTIVEMQ_BROKER_URL:tcp://localhost:61616}
    user: ${ACTIVEMQ_USER:admin}
    password: ${ACTIVEMQ_PASSWORD:admin}
    packages:
      trust-all: true

server:
  port: ${IDENTITY_SERVICE_PORT:8081}

services:
  host-airline:
    url: ${HOST_AIRLINE_SERVICE_URL:http://localhost:8086}

# ----------------------------------
# SECURITY CONFIG
# ----------------------------------
security:
  jwt:
    issuer: ${AUTH_IDENTITY_SERVICE_ISSUER_URI:http://localhost:8081}
    audience: ${JWT_AUDIENCE:codeshare-api}

    access-token-ttl: ${ACCESS_TOKEN_TTL:900}
    refresh-token-ttl: ${REFRESH_TOKEN_TTL:2592000}

    keystore:
      location: ${KEYSTORE_LOCATION:classpath:auth-keystore.p12}
      store-password: ${KEYSTORE_PASSWORD:admin123}
      key-alias: ${KEY_ALIAS:auth-server}
      key-password: ${KEY_PASSWORD:admin123}

  oidc:
    state:
      secret: ${OIDC_STATE_SECRET:somesecretkeyforoidcstatesomesecretkeyforoidcstate}
      ttl-seconds: ${OIDC_STATE_TTL_SECONDS:300}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,X-Tenant-Id}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}

  public-endpoints:
    auth:
      - /auth/login
      - /auth/refresh
      - /auth/logout
      - /auth/service-token
      - /.well-known/**
    actuator:
      - /actuator/health
      - /actuator/info

  s2s:
    client-id: ${INTERNAL_S2S_CLIENT_ID:internal-s2s-client}
    client-secret: ${INTERNAL_S2S_CLIENT_SECRET:admin123}

# ----------------------------------
# ACTUATOR
# ----------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# ----------------------------------
# LOGGING
# ----------------------------------
logging:
  level:
    org.springframework.security: TRACE
    org.springframework.security.oauth2: TRACE
    org.springframework.web: DEBUG
