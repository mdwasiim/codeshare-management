spring:
  application:
    name: schedule-ingestion-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_IDENTITY_SERVICE_ISSUER_URI:http://localhost:8081}

  datasource:
    driver-class-name: ${SCHEDULE_INGESTION_DB_DRIVER:${DB_DRIVER:org.postgresql.Driver}}
    url: ${SCHEDULE_INGESTION_DB_URL:${DB_URL:jdbc:postgresql://localhost:5432/csm?reWriteBatchedInserts=true}}
    username: ${SCHEDULE_INGESTION_DB_USERNAME:${DB_USERNAME:postgres}}
    password: ${SCHEDULE_INGESTION_DB_PASSWORD:${DB_PASSWORD:postgres}}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  sql:
    init:
      mode: always

  jpa:
    defer-datasource-initialization: true
    open-in-view: false
    show-sql: ${SHOW_SQL:false}
    hibernate:
      ddl-auto: ${HIBERNATE_DDL:update}
    properties:
      hibernate:
        format_sql: ${FORMAT_SQL:false}
        default_schema: schedule_ingestion
        hbm2ddl:
          create_namespaces: true
        jdbc:
          batch_size: ${HIBERNATE_JDBC_BATCH_SIZE:1000}
          batch_versioned_data: true
        order_inserts: true
        order_updates: true

  activemq:
    broker-url: ${ACTIVEMQ_BROKER_URL:tcp://localhost:61616}
    user: ${ACTIVEMQ_USER:admin}
    password: ${ACTIVEMQ_PASSWORD:admin}
    packages:
      trust-all: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        max.block.ms: ${KAFKA_PRODUCER_MAX_BLOCK_MS:5000}
        delivery.timeout.ms: ${KAFKA_PRODUCER_DELIVERY_TIMEOUT_MS:10000}
        request.timeout.ms: ${KAFKA_PRODUCER_REQUEST_TIMEOUT_MS:5000}

server:
  port: ${SCHEDULE_INGESTION_SERVICE_PORT:8082}

logging:
  level:
    org.springframework.web: DEBUG
    org.apache.camel.component.file: TRACE
    org.apache.camel.component.file.remote: TRACE

# ----------------------------------
# INGESTION CONFIG
# ----------------------------------
ingestion:
  local-root: ${INGESTION_LOCAL_ROOT:C:/Users/mdwas/Projects/messages}

  validation:
    business-enabled: ${SCHEDULE_INGESTION_BUSINESS_VALIDATION_ENABLED:true}

  ssim:
    flight-batch-size: ${SSIM_FLIGHT_BATCH_SIZE:5000}
    validation-mode: ${SSIM_VALIDATION_MODE:RELAXED}

  allowed-extensions:
    SSIM: [txt, ssim]
    SSM: [txt, ssim]
    ASM: [txt, ssim]

# ----------------------------------
# CAMEL CONFIG
# ----------------------------------
camel:
  springboot:
    auto-startup: false

# ----------------------------------
# APP CONFIG
# ----------------------------------
app:
  security:
    enabled: ${APP_SECURITY_ENABLED:true}
  crypto:
    secret: ${APP_CRYPTO_SECRET:YOUR_16_32_BYTE_SECRET_KEY}

tenant:
  service:
    url: ${TENANT_SERVICE_URL:http://localhost:8086}

master-data:
  service:
    url: ${MASTER_DATA_SERVICE_URL:http://localhost:8089}

services:
  identity:
    url: ${AUTH_IDENTITY_SERVICE_URL:http://localhost:8081}
    s2s:
      client-id: ${INTERNAL_S2S_CLIENT_ID:internal-s2s-client}
      client-secret: ${INTERNAL_S2S_CLIENT_SECRET:admin123}

schedule:
  workflow:
    topics:
      import-completed: ${SCHEDULE_WORKFLOW_IMPORT_COMPLETED_TOPIC:schedule.workflow.import-completed}
      processing-requested: ${SCHEDULE_WORKFLOW_PROCESSING_REQUESTED_TOPIC:schedule.workflow.processing-requested}
