spring:
  application:
    name: tenant-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_IDENTITY_SERVICE_ISSUER_URI:http://localhost:8081}

  datasource:
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    url: ${DB_URL:jdbc:postgresql://localhost:5432/csm}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    open-in-view: false
    show-sql: ${SHOW_SQL:true}
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: ${FORMAT_SQL:true}
        default_schema: tenant_core
        hbm2ddl:
          create_namespaces: true

  flyway:
    enabled: true
    default-schema: tenant_core
    locations: classpath:db/migration
    placeholder-replacement: false

server:
  port: ${TENANT_SERVICE_PORT:${HOST_AIRLINE_SERVICE_PORT:8086}}

services:
  identity:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8081}
    s2s:
      client-id: ${INTERNAL_S2S_CLIENT_ID:internal-s2s-client}
      client-secret: ${INTERNAL_S2S_CLIENT_SECRET:admin123}
  master-data:
    url: ${MASTER_DATA_SERVICE_URL:http://localhost:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info
