# =====================================================
# PROFILE
# =====================================================
SPRING_PROFILES_ACTIVE=dev

# =====================================================
# SERVER
# =====================================================
SCHEDULE_PROCESSOR_SERVICE_PORT=8085

# DATABASE
DB_HOST=localhost
DB_PORT=5432
DB_NAME=csm
DB_USERNAME=postgres
DB_PASSWORD=postgres

DB_DRIVER=org.postgresql.Driver
DB_URL=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}

SHOW_SQL=true
FORMAT_SQL=true
HIBERNATE_DDL=update
# =====================================================
# KAFKA CONFIG
# =====================================================
KAFKA_BOOTSTRAP_SERVERS=localhost:9092
KAFKA_CONSUMER_GROUP=ssim-processor

# =====================================================
# KAFKA TOPICS
# =====================================================
KAFKA_TOPIC_FILE_FLIGHT=ssim.flight.block
KAFKA_TOPIC_FAILED=ssim.processing.failed
KAFKA_TOPIC_READY=ssim.schedule.ready

# =====================================================
# DOWNSTREAM SERVICES
# =====================================================
SCHEDULE_SERVICE_URL=http://localhost:8082
CODESHARE_SERVICE_URL=http://localhost:8083

# =====================================================
# LOGGING
# =====================================================
LOG_LEVEL_APP=DEBUG

# =====================================================
# SECURITY (JWT VALIDATION ONLY)
# =====================================================
AUTH_IDENTITY_SERVICE_ISSUER_URI=http://localhost:8081