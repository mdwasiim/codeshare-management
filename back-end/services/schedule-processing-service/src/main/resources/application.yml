spring:
  application:
    name: schedule-processor-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_IDENTITY_SERVICE_ISSUER_URI:http://localhost:8081}

  datasource:
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    url: ${DB_URL:jdbc:postgresql://localhost:5432/csm}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    open-in-view: false
    show-sql: ${SHOW_SQL:true}
    hibernate:
      ddl-auto: ${HIBERNATE_DDL:update}
    properties:
      hibernate:
        format_sql: ${FORMAT_SQL:true}
        default_schema: schedule_processor
        hbm2ddl:
          create_namespaces: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:ssim-processor}
      auto-offset-reset: earliest
      enable-auto-commit: false

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.json.trusted.packages: "*"

# ----------------------------------
# KAFKA TOPICS
# ----------------------------------
ssim:
  kafka:
    topics:
      file-flight: ${KAFKA_TOPIC_FILE_FLIGHT:ssim.flight.block}
      processing-failed: ${KAFKA_TOPIC_FAILED:ssim.processing.failed}
      schedule-ready: ${KAFKA_TOPIC_READY:ssim.schedule.ready}

# ----------------------------------
# EXTERNAL SERVICE CALLS
# ----------------------------------
services:
  schedule:
    url: ${SCHEDULE_SERVICE_URL:http://localhost:8082}
  codeshare:
    url: ${CODESHARE_SERVICE_URL:http://localhost:8083}

# ----------------------------------
# SERVER
# ----------------------------------
server:
  port: ${SCHEDULE_PROCESSOR_SERVICE_PORT:8085}

# ----------------------------------
# LOGGING
# ----------------------------------
logging:
  level:
    root: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.kafka: INFO
