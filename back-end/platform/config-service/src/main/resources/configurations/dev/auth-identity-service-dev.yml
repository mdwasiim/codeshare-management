spring:
  application:
    name: auth-identity-service

server:
  port: ${AUTH_IDENTITY_SERVICE_PORT:8081}

# =====================================================
# AUTH PROVIDERS
# =====================================================
csm:
  auth:
    providers:

      azure:
        enabled: ${AZURE_ENABLED:false}   # ✅ disable locally
        priority: 1
        tenant-id: ${AZURE_TENANT_ID:dummy-tenant}
        client-id: ${AZURE_CLIENT_ID:dummy-client}
        client-secret-ref: env://AZURE_CLIENT_SECRET
        redirect-uri: ${AZURE_REDIRECT_URI:http://localhost:4200/callback}
        scopes: "openid profile email"

      ldap:
        enabled: ${LDAP_ENABLED:false}   # ✅ disable locally
        priority: 2
        url: ${LDAP_URL:ldaps://localhost:636}
        base: ${LDAP_BASE:dc=company,dc=com}
        user-dn: ${LDAP_USER_DN:CN=ldap-reader}
        password: ${LDAP_PASSWORD:dummy}

      local:
        enabled: true
        priority: 3

# =====================================================
# SECURITY (JWT)
# =====================================================
security:
  jwt:
    issuer: ${AUTH_IDENTITY_ISSUER_URI:http://localhost:8081}
    audience: ${JWT_AUDIENCE:codeshare-api}

    access-token-ttl: ${ACCESS_TOKEN_TTL:900}
    refresh-token-ttl: ${REFRESH_TOKEN_TTL:2592000}

    keystore:
      location: ${KEYSTORE_LOCATION:classpath:auth-keystore.p12}   # ✅ FIXED
      store-password: ${KEYSTORE_PASSWORD:admin123}
      key-alias: ${KEY_ALIAS:auth-server}                          # ✅ FIXED
      key-password: ${KEY_PASSWORD:admin123}

  oidc:
    state:
      secret: ${OIDC_STATE_SECRET:changeit}
      ttl-seconds: ${OIDC_STATE_TTL_SECONDS:300}

# =====================================================
# LOGGING
# =====================================================
logging:
  level:
    org.springframework.security: INFO
    com.codeshare.airline: DEBUG   # ✅ better for dev